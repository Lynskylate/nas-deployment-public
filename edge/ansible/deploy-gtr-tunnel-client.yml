---
- name: Deploy tunnel client stack (Shadow-TLS client + Shadowsocks client) to GTR
  hosts: gtr_core
  become: true

  roles:
    - role: shadowtls-client
    - role: shadowsocks-client

  post_tasks:
    - name: Restart tunnel client services in dependency order
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
        daemon_reload: true
      loop:
        - shadow-tls-client
        - shadowsocks-client

    - name: Ensure tunnel client services are running
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - shadow-tls-client
        - shadowsocks-client

    - name: Display tunnel client summary
      ansible.builtin.debug:
        msg:
          - "Tunnel client host: {{ inventory_hostname }}"
          - "Shadow-TLS client listen: 127.0.0.1:{{ shadowtls_client_listen_port }}"
          - "SOCKS5 listen: {{ shadowsocks_client_local_address }}:{{ shadowsocks_client_port }}"
          - "Remote tunnel server: {{ remote_server_ip }}:{{ shadowtls_tls_port }}"
