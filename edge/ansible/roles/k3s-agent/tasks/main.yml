---
- name: Assert K3s agent join settings are provided
  ansible.builtin.assert:
    that:
      - k3s_server_url is defined
      - k3s_server_url | length > 0
      - k3s_cluster_token is defined
      - k3s_cluster_token | length > 0
    fail_msg: "k3s_server_url and k3s_cluster_token must be provided before deploying K3s agents"
  no_log: true

- name: Read agent Tailscale IPv4 address
  ansible.builtin.command: tailscale ip -4
  register: k3s_agent_tailscale_ip_cmd
  changed_when: false

- name: Derive effective K3s agent node IP
  ansible.builtin.set_fact:
    k3s_agent_effective_ip: "{{ k3s_agent_tailscale_ip_cmd.stdout_lines[0] }}"

- name: Derive effective K3s agent server URL
  ansible.builtin.set_fact:
    k3s_agent_effective_server_url: "{{ k3s_agent_server_url | default(k3s_server_url) }}"

- name: Ensure K3s agent config directory exists
  ansible.builtin.file:
    path: "{{ k3s_agent_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render K3s agent config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ k3s_agent_config_path }}"
    owner: root
    group: root
    mode: "0600"
  notify: restart k3s agent

- name: Render containerd registry mirrors
  ansible.builtin.template:
    src: registries.yaml.j2
    dest: "/etc/rancher/k3s/registries.yaml"
    owner: root
    group: root
    mode: "0644"
  when: k3s_registry_mirrors is defined and (k3s_registry_mirrors | length > 0)
  notify: restart k3s agent

- name: Set K3s installer script URL
  ansible.builtin.set_fact:
    k3s_effective_install_script_url: >-
      {{ (k3s_mirror == 'cn') | ternary('https://rancher-mirror.rancher.cn/k3s/k3s-install.sh', k3s_install_script_url) }}

- name: Check if K3s binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_agent_binary

- name: Check if K3s agent service exists
  ansible.builtin.stat:
    path: "{{ k3s_agent_service_path }}"
  register: k3s_agent_service

- name: Check K3s agent runtime health
  ansible.builtin.shell: |
    if ! systemctl is-active --quiet {{ k3s_agent_service_name }}; then
      echo "not_running"
    else
      echo "healthy"
    fi
  register: k3s_agent_health
  changed_when: false
  failed_when: false

- name: Determine if K3s agent installation is needed
  ansible.builtin.set_fact:
    k3s_agent_needs_install: >-
      {{ not k3s_agent_binary.stat.exists
         or not k3s_agent_service.stat.exists
         or k3s_agent_health.stdout != 'healthy' }}

- name: Download K3s installer
  ansible.builtin.get_url:
    url: "{{ k3s_effective_install_script_url }}"
    dest: "{{ k3s_install_script_path }}"
    owner: root
    group: root
    mode: "0755"
  environment: "{{ {'http_proxy': github_download_proxy, 'https_proxy': github_download_proxy} if (github_download_proxy | default('') | length > 0) else {} }}"
  when: k3s_agent_needs_install | bool

- name: Build K3s agent install environment
  ansible.builtin.set_fact:
    k3s_agent_install_env: >-
      {{ {'INSTALL_K3S_CHANNEL': k3s_channel,
          'INSTALL_K3S_MIRROR': k3s_mirror,
          'K3S_URL': k3s_agent_effective_server_url,
          'K3S_TOKEN': k3s_cluster_token,
          'INSTALL_K3S_EXEC': 'agent',
          'K3S_P2P_PORT': (k3s_p2p_port | string)}
        | combine((k3s_mirror != 'cn') | ternary({'http_proxy': github_download_proxy, 'https_proxy': github_download_proxy}, {}))
        | dict2items | rejectattr('value', 'equalto', '') | items2dict }}

- name: Install K3s agent
  ansible.builtin.shell: |
    set -euo pipefail
    sh "{{ k3s_install_script_path }}"
  args:
    executable: /bin/bash
  environment: "{{ k3s_agent_install_env }}"
  when: k3s_agent_needs_install | bool

- name: Configure containerd HTTP proxy for image pulling
  ansible.builtin.blockinfile:
    path: "/etc/systemd/system/{{ k3s_agent_service_name }}.service.env"
    block: |
      HTTP_PROXY={{ k3s_containerd_http_proxy }}
      HTTPS_PROXY={{ k3s_containerd_https_proxy }}
      NO_PROXY={{ k3s_containerd_no_proxy }}
    marker: "# {mark} ANSIBLE MANAGED: containerd proxy"
    create: true
    mode: "0600"
  when: k3s_containerd_http_proxy | default('') | length > 0
  notify: restart k3s agent

- name: Configure K3s embedded registry P2P port
  ansible.builtin.blockinfile:
    path: "/etc/systemd/system/{{ k3s_agent_service_name }}.service.env"
    block: |
      K3S_P2P_PORT={{ k3s_p2p_port }}
    marker: "# {mark} ANSIBLE MANAGED: k3s p2p port"
    create: true
    mode: "0600"
  when: k3s_p2p_port is defined
  notify: restart k3s agent

- name: Flush K3s agent handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure K3s agent is enabled and started
  ansible.builtin.systemd:
    name: "{{ k3s_agent_service_name }}"
    daemon_reload: true
    enabled: true
    state: started

- name: Read K3s agent state
  ansible.builtin.command: systemctl is-active {{ k3s_agent_service_name }}
  register: k3s_agent_state
  changed_when: false

- name: Show K3s agent deployment summary
  ansible.builtin.debug:
    msg:
      - "host={{ inventory_hostname }}"
      - "k3s_agent_ip={{ k3s_agent_effective_ip }}"
      - "k3s_agent_server={{ k3s_agent_effective_server_url }}"
      - "k3s_agent_state={{ k3s_agent_state.stdout }}"
      - "health={{ k3s_agent_health.stdout | default('unknown') }}"
      - "needs_install={{ k3s_agent_needs_install | default(true) }}"
