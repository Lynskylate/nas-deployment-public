---
- name: Verify Sealed Secrets on aliyun K3s
  hosts: edge_aliyun
  become: true

  tasks:
    - name: Check Sealed Secrets controller pod
      ansible.builtin.shell: |
        k3s kubectl -n kube-system get pods -l name=sealed-secrets-controller -o wide
      register: sealed_secrets_pods
      changed_when: false
      failed_when: false

    - name: Check Sealed Secrets controller deployment
      ansible.builtin.shell: |
        k3s kubectl -n kube-system rollout status deployment/sealed-secrets-controller --timeout=10s
      register: sealed_secrets_deploy
      changed_when: false
      failed_when: false

    - name: Check test-secret exists
      ansible.builtin.shell: |
        k3s kubectl get secret test-secret -o jsonpath='{.data.stdin}' 2>/dev/null | base64 -d
      register: test_secret_value
      changed_when: false
      failed_when: false

    - name: Check public key file exists
      ansible.builtin.stat:
        path: /tmp/sealed-secrets-public-key.pem
      register: public_key_file

    - name: Show Sealed Secrets summary
      ansible.builtin.debug:
        msg:
          - "=== Sealed Secrets Verification ==="
          - "Controller pods:"
          - "{{ sealed_secrets_pods.stdout | default('NOT FOUND') }}"
          - ""
          - "Controller rollout: {{ sealed_secrets_deploy.stdout | default('check failed') }}"
          - "Test secret value: {{ test_secret_value.stdout | default('NOT FOUND') }}"
          - "Public cert file: {{ 'EXISTS' if public_key_file.stat.exists else 'MISSING' }}"
          - ""
          - "To verify decryption from another machine:"
          - "  kubeseal --controller-namespace=kube-system --fetch-cert > pub.pem"
          - "  kubectl get sealedsecret test-secret -o yaml"
          - ""
          - "To back up the private key (re-export from cluster):"
          - "  ssh root@100.102.140.59 k3s kubectl get secret -n kube-system \\"
          - "    -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml \\"
          - "    > /tmp/sealed-secrets-key-backup.yaml"
          - "  sops --encrypt ... > nas-deployment-vault/infra/sealed-secrets/key-backup.enc.yaml"
