apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoriametrics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts
    chart: victoria-metrics-single
    targetRevision: 0.x
    helm:
      values: |
        server:
          persistentVolume:
            enabled: true
            existingClaim: victoriametrics-data
          extraArgs:
            envflag.enable: "true"
            envflag.prefix: VM_
            loggerFormat: json
            retentionPeriod: "360h"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          nodeSelector:
            kubernetes.io/hostname: gtr
        service:
          annotations:
            tailscale.com/expose: "true"
            tailscale.com/proxy-class: gtr-only
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
