---
# Optimized: merged user + dirs + systemd; kept copy/template for files

- name: Setup vector user and directories
  ansible.builtin.shell: |
    set -e
    id -u vector &>/dev/null || useradd -r -s /usr/sbin/nologin vector
    mkdir -p {{ vector_config_dir }} {{ vector_data_dir }} {{ vector_log_path }}
    chown vector:vector {{ vector_config_dir }} {{ vector_data_dir }} {{ vector_log_path }}

- name: Deploy vector systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/vector.service
    content: |
      [Unit]
      Description=Vector observability pipeline
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=vector
      Group=vector
      ExecStart={{ vector_bin_path }} --config {{ vector_config_dir }}/vector.yaml
      Restart=always
      RestartSec=5
      StandardOutput=journal
      StandardError=journal
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectSystem=strict
      ProtectHome=true
      ReadWritePaths={{ vector_data_dir }} {{ vector_log_path }}

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify:
    - reload systemd
    - restart vector

- name: Deploy vector config
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: "{{ vector_config_dir }}/vector.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: restart vector

- name: Check if vector binary exists
  ansible.builtin.stat:
    path: "{{ vector_bin_path }}"
  register: vector_binary

- name: Download vector archive
  ansible.builtin.get_url:
    url: "{{ vector_download_url }}/v{{ vector_version }}/vector-{{ vector_version }}-x86_64-unknown-linux-gnu.tar.gz"
    dest: /tmp/vector-{{ vector_version }}.tar.gz
    timeout: 300
  environment: "{{ {'http_proxy': github_download_proxy, 'https_proxy': github_download_proxy} if (github_download_proxy | default('') | length > 0) else {} }}"
  register: vector_download_result
  retries: 5
  delay: 10
  until: vector_download_result is succeeded
  when: not vector_binary.stat.exists

- name: Extract vector binary
  ansible.builtin.unarchive:
    src: /tmp/vector-{{ vector_version }}.tar.gz
    dest: "{{ vector_bin_path | dirname }}"
    remote_src: true
    extra_opts:
      - "--strip-components=2"
      - "vector-x86_64-unknown-linux-gnu/bin/vector"
  when: vector_download_result is succeeded
  notify: restart vector

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure vector service is enabled and running
  ansible.builtin.shell: |
    set -e
    systemctl daemon-reload
    systemctl enable --now vector 2>/dev/null || systemctl start vector
  changed_when: false
