---
# Latency and connectivity report for the proxy path through new VPS
# Usage: ansible-playbook -i inventory.ini latency-report.yml
# Runs on client_server (gtr), tests proxy chain latency via ShadowTLS

- name: Generate proxy latency report
  hosts: client_server
  become: true
  vars:
    report_file: "/tmp/proxy-latency-report.md"
    test_count: 5

  tasks:
    - name: Display report header
      ansible.builtin.debug:
        msg: "=== Proxy Latency Report for {{ remote_server_ip }} ==="

    # 1. ICMP ping to new VPS
    - name: ICMP ping to {{ remote_server_ip }}
      ansible.builtin.shell: |
        ping -c {{ test_count }} -q {{ remote_server_ip }} 2>&1 | tail -2
      register: icmp_ping
      changed_when: false
      ignore_errors: true

    # 2. SOCKS5 proxy latency - connect time
    - name: Test SOCKS5 proxy connect latency (to api.ipify.org)
      ansible.builtin.shell: |
        for i in $(seq 1 {{ test_count }}); do
          curl -o /dev/null -s -w '%{time_connect} %{time_total}\n' \
            --socks5 127.0.0.1:{{ shadowsocks_client_port }} \
            --connect-timeout 10 \
            https://api.ipify.org 2>&1 || echo "FAIL FAIL"
        done
      register: socks_latency
      changed_when: false
      ignore_errors: true

    # 3. Verify proxy egress IP matches new VPS
    - name: Verify proxy egress IP
      ansible.builtin.shell: |
        curl -s --socks5 127.0.0.1:{{ shadowsocks_client_port }} \
          --connect-timeout 10 https://api.ipify.org 2>&1
      register: egress_ip
      changed_when: false
      ignore_errors: true

    # 4. Download speed test (Cloudflare 10MB test file)
    - name: Download speed test via proxy (Cloudflare 10MB)
      ansible.builtin.shell: |
        curl -o /dev/null -s -w 'speed:%{speed_download} bytes/sec\ntime:%{time_total}s\nsize:%{size_download}\n' \
          --socks5 127.0.0.1:{{ shadowsocks_client_port }} \
          --connect-timeout 15 \
          https://speed.cloudflare.com/__down?bytes=10000000 2>&1
      register: dl_speed
      changed_when: false
      ignore_errors: true

    # 5. Mihomo ShadowTLS node delay test
    - name: Test Mihomo ShadowTLS-Remote node delay
      ansible.builtin.shell: |
        curl -s -X GET \
          "http://127.0.0.1:9090/proxies/ShadowTLS-Remote/delay?timeout=5000&url=https://www.gstatic.com/generate_204" \
          -H "Authorization: Bearer {{ mihomo_secret }}" 2>&1
      register: mihomo_shadowtls_delay
      changed_when: false
      ignore_errors: true

    # 6. BBR verification on remote server
    - name: Verify BBR on remote server
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 root@{{ remote_server_ip }} \
          "sysctl net.ipv4.tcp_congestion_control net.core.default_qdisc" 2>&1
      register: bbr_verify
      changed_when: false
      delegate_to: localhost
      ignore_errors: true

    # 7. Service status on remote server
    - name: Check services on remote server
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 root@{{ remote_server_ip }} \
          "systemctl is-active shadowsocks-server shadow-tls-server envoy node_exporter" 2>&1
      register: remote_services
      changed_when: false
      delegate_to: localhost
      ignore_errors: true

    # Generate markdown report
    - name: Generate markdown report
      ansible.builtin.copy:
        content: |
          # Proxy Latency Report — {{ remote_server_ip }}
          Generated: {{ ansible_date_time.iso8601 }}

          ## 1. ICMP Ping (GTR → {{ remote_server_ip }})

          ```
          {{ icmp_ping.stdout | default('FAILED') }}
          ```

          ## 2. SOCKS5 Proxy Latency (via ShadowTLS → api.ipify.org)

          Format: `connect_time total_time` (seconds, {{ test_count }} samples)

          ```
          {{ socks_latency.stdout | default('FAILED') }}
          ```

          ## 3. Proxy Egress IP

          ```
          {{ egress_ip.stdout | default('FAILED') }}
          ```

          Expected: `{{ remote_server_ip }}`

          ## 4. Download Speed via Proxy (10MB Cloudflare test)

          ```
          {{ dl_speed.stdout | default('FAILED') }}
          ```

          ## 5. Mihomo ShadowTLS-Remote Node Delay

          ```
          {{ mihomo_shadowtls_delay.stdout | default('FAILED') }}
          ```

          ## 6. BBR Status on Remote Server

          ```
          {{ bbr_verify.stdout | default('FAILED') }}
          ```

          ## 7. Service Status on Remote Server

          ```
          {{ remote_services.stdout | default('FAILED') }}
          ```

          ---

          _Report generated by `ansible-playbook -i inventory.ini latency-report.yml`_
        dest: "{{ report_file }}"
        mode: '0644'

    - name: Display report
      ansible.builtin.command: cat {{ report_file }}
      register: report_content
      changed_when: false

    - name: Show report output
      ansible.builtin.debug:
        var: report_content.stdout_lines

    - name: Report saved
      ansible.builtin.debug:
        msg: "Report saved to {{ report_file }}"
