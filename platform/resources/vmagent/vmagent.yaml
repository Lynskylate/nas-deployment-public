# VMAgent — scrape proxy managed by VictoriaMetrics Operator
# Watches VM-native scrape CRDs and remote_writes all metrics
# to VictoriaMetrics.
#
# Architecture:
#   VMServiceScrape / VMPodScrape / VMStaticScrape
#     → Operator generates config
#     → VMAgent scrapes
#     → remote_write
#     → VictoriaMetrics
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAgent
metadata:
  name: scraper
  namespace: monitoring
spec:
  selectAllByDefault: true
  # Watch VM-native scrape CRDs
  serviceScrapeSelector: {}
  serviceScrapeNamespaceSelector: {}
  podScrapeSelector: {}
  podScrapeNamespaceSelector: {}
  remoteWrite:
    - url: "http://victoriametrics.monitoring.svc:8428/api/v1/write"
  # Resources for the VMAgent pod itself
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Pin to GTR (same node as VictoriaMetrics for low-latency writes)
  nodeSelector:
    kubernetes.io/hostname: gtr
  scrapeInterval: "15s"
  # Inline scrape config for targets that don't fit CRDs cleanly
  # (e.g., the VMAgent's own /metrics endpoint)
  inlineScrapeConfig: |
    - job_name: vmagent
      static_configs:
        - targets: ["localhost:8429"]
---
# --- In-cluster VMServiceScrapes ---

# VictoriaMetrics self-monitoring
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: victoriametrics
  namespace: monitoring
  labels:
    app: victoriametrics
spec:
  attach_metadata: {}
  selector:
    matchLabels:
      app: victoriametrics
  endpoints:
    - attach_metadata: {}
      port: http
      interval: 15s
      path: /metrics
  namespaceSelector:
    matchNames:
      - monitoring
---
# Node Exporter (DaemonSet headless Service)
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    app: node-exporter
spec:
  attach_metadata: {}
  selector:
    matchLabels:
      app: node-exporter
  endpoints:
    - attach_metadata: {}
      port: metrics
      interval: 15s
      path: /metrics
      # Enrich with node labels from pod metadata
      relabelConfigs:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
  namespaceSelector:
    matchNames:
      - monitoring
