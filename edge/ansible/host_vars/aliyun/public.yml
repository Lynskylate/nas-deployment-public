---
# === 原 K3s server（已迁移至 tencent），现降级为 agent ===

ansible_ssh_common_args: '-o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=30 -o ConnectionAttempts=3'
envoy_bin_path: "/usr/bin"
edge_manage_envoy_binary_dir: false
edge_tunnel_server_enabled: false
tailscale_p2p_heal_enabled: true
tailscale_p2p_peer_name: vmtencent
tailscale_p2p_peer_ip: 100.99.48.76
edge_tailscale_accept_dns: false

# Agent 配置 — 通过 Tailscale 直连 tencent server（两者均为国内节点，Tailscale 稳定）
k3s_agent_server_url: "https://100.99.48.76:6443"
k3s_containerd_http_proxy: "http://{{ gtr_tailscale_ip }}:7890"
k3s_prereq_tailscale_nodivert: true
k3s_registry_mirrors: {}
k3s_node_labels:
  gtr.io/region: cn
  gtr.io/visibility: public
k3s_node_taints:
  - "CriticalAddonsOnly=true:NoSchedule"

# aliyun 有公网 IP 可直接访问 GitHub，不需要通过 GTR 代理。
github_download_proxy: ""

# Aliyun edge node only exposes edge-proxy functions.
envoy_domain_routes:
  - name: node_exporter_metrics
    mode: http_plaintext
    path_prefix: "/metrics"
    cluster: node_exporter
  - name: envoy_admin_metrics
    mode: http_plaintext
    path_prefix: "/stats/prometheus"
    cluster: envoy_admin

# Aliyun pushes Envoy logs to GTR via Tailscale.
edge_vector_sink_type: "victorialogs"
victorialogs_host: "{{ gtr_tailscale_ip }}"
victorialogs_port: 8429
