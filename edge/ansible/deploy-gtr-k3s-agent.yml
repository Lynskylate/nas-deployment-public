---
- name: Deploy K3s agents on GTR and tencent
  hosts: gtr_core:edge_tencent
  become: true

  roles:
    - role: k3s-prereq
    - role: k3s-agent

- name: Apply K3s node labels
  hosts: gtr_core:edge_tencent
  become: true

  tasks:
    - name: Apply node labels
      ansible.builtin.command: "k3s kubectl label node {{ inventory_hostname }} {{ item.key }}={{ item.value }} --overwrite"
      loop: "{{ k3s_node_labels | default({}) | dict2items }}"
      changed_when: false
      failed_when: false