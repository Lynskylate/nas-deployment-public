---
- name: Install K3s prerequisite packages
  ansible.builtin.apt:
    name: "{{ k3s_prereq_packages }}"
    state: present
    update_cache: true

- name: Persist required kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for item in k3s_prereq_modules %}
      {{ item }}
      {% endfor %}

- name: Load required kernel modules
  ansible.builtin.command: "modprobe {{ item }}"
  loop: "{{ k3s_prereq_modules }}"
  changed_when: false

- name: Deploy K3s sysctl baseline
  ansible.builtin.template:
    src: k3s-sysctl.conf.j2
    dest: /etc/sysctl.d/90-k3s.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload k3s sysctl
