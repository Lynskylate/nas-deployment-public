---
# Envoy Server deployment tasks for remote server

- name: Create envoy user
  ansible.builtin.user:
    name: envoy
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/envoy
    create_home: true

- name: Create Envoy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: envoy
    group: envoy
    mode: '0755'
  loop:
    - "{{ envoy_bin_path }}"
    - /etc/envoy
    - /etc/envoy/dynamic_config
    - /var/log/envoy
    - /var/lib/envoy

- name: Download Envoy binary
  ansible.builtin.get_url:
    url: "{{ envoy_download_url }}/{{ envoy_version }}/envoy-{{ envoy_version | regex_replace('^v', '') }}-linux-x86_64"
    dest: "{{ envoy_bin_path }}/envoy"
    owner: envoy
    group: envoy
    mode: '0755'
    timeout: 300
  register: envoy_download

- name: Deploy Envoy systemd service file
  ansible.builtin.template:
    src: envoy.service.j2
    dest: /etc/systemd/system/envoy.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd

- name: Deploy Envoy static configuration
  ansible.builtin.template:
    src: envoy.yaml.j2
    dest: /etc/envoy/envoy.yaml
    owner: envoy
    group: envoy
    mode: '0644'
  notify:
    - restart envoy

- name: Deploy Envoy dynamic LDS configuration
  ansible.builtin.template:
    src: lds.yaml.j2
    dest: /etc/envoy/dynamic_config/lds.yaml
    owner: envoy
    group: envoy
    mode: '0644'
  notify:
    - restart envoy

- name: Deploy Envoy dynamic CDS configuration
  ansible.builtin.template:
    src: cds.yaml.j2
    dest: /etc/envoy/dynamic_config/cds.yaml
    owner: envoy
    group: envoy
    mode: '0644'
  notify:
    - restart envoy

- name: Configure firewall for Envoy (UFW)
  ansible.builtin.ufw:
    rule: allow
    port: "443"
    proto: tcp
  when: ansible_facts['pkg_mgr'] == 'apt'
  ignore_errors: true

- name: Configure firewall for Envoy (firewalld)
  ansible.builtin.firewalld:
    port: "443/tcp"
    permanent: true
    state: enabled
  when: ansible_facts['pkg_mgr'] == 'dnf' or ansible_facts['pkg_mgr'] == 'yum'
  ignore_errors: true

- name: Ensure logrotate is installed
  ansible.builtin.package:
    name: logrotate
    state: present

- name: Deploy Envoy logrotate configuration
  ansible.builtin.template:
    src: envoy.logrotate.j2
    dest: /etc/logrotate.d/envoy
    owner: root
    group: root
    mode: '0644'

- name: Configure cron for logrotate (if logrotate.timer not available)
  ansible.builtin.cron:
    name: "logrotate envoy"
    minute: "30"
    hour: "2"
    job: "/usr/sbin/logrotate /etc/logrotate.d/envoy"
    user: root
  when: ansible_facts['service_mgr'] != 'systemd' or ansible_lsb.id != 'Ubuntu'

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start Envoy service
  ansible.builtin.systemd:
    name: envoy
    state: started
    enabled: true

- name: Wait for Envoy to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ envoy_admin_port }}"
    timeout: 30
