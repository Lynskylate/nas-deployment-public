---
# Shadowsocks Server Role

- name: Create shadowsocks user
  ansible.builtin.user:
    name: shadowsocks
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Create data directory
  ansible.builtin.file:
    path: /var/lib/shadowsocks
    state: directory
    owner: shadowsocks
    group: shadowsocks
    mode: '0750'

- name: Check if shadowsocks binary exists
  ansible.builtin.stat:
    path: "{{ ss_server_bin_path }}/ssserver"
  register: ss_binary

- name: Download shadowsocks-rust
  ansible.builtin.get_url:
    url: "{{ shadowsocks_download_url }}/{{ shadowsocks_version }}/shadowsocks-{{ shadowsocks_version }}.x86_64-unknown-linux-gnu.tar.xz"
    dest: /tmp/shadowsocks.tar.xz
    mode: '0644'
    timeout: 300
  environment: "{{ {'http_proxy': github_download_proxy, 'https_proxy': github_download_proxy} if (github_download_proxy | default('') | length > 0) else {} }}"
  register: download_result
  until: download_result is succeeded
  retries: 5
  delay: 10
  when: not ss_binary.stat.exists

- name: Extract shadowsocks archive
  ansible.builtin.unarchive:
    src: /tmp/shadowsocks.tar.xz
    dest: /tmp
    remote_src: true
  when: not ss_binary.stat.exists

- name: Create installation directory
  ansible.builtin.file:
    path: "{{ ss_server_bin_path }}"
    state: directory
    mode: '0755'
  when: not ss_binary.stat.exists

- name: Install ssserver binary
  ansible.builtin.copy:
    src: /tmp/ssserver
    dest: "{{ ss_server_bin_path }}/ssserver"
    mode: '0755'
    remote_src: true
  when: not ss_binary.stat.exists
  notify: restart shadowsocks-server

- name: Create config directory
  ansible.builtin.file:
    path: /etc/shadowsocks
    state: directory
    mode: '0755'

- name: Deploy shadowsocks server config
  ansible.builtin.template:
    src: server-config.json.j2
    dest: /etc/shadowsocks/config.json
    mode: '0640'
    owner: shadowsocks
    group: shadowsocks
  notify: restart shadowsocks-server

- name: Deploy systemd service file
  ansible.builtin.template:
    src: shadowsocks-server.service.j2
    dest: /etc/systemd/system/shadowsocks-server.service
    mode: '0644'
  notify:
    - reload systemd
    - restart shadowsocks-server

- name: Enable and start shadowsocks-server
  ansible.builtin.systemd:
    name: shadowsocks-server
    enabled: true
    state: started
    daemon_reload: true

- name: Cleanup temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/shadowsocks.tar.xz
    - /tmp/ssserver
    - /tmp/sslocal
  ignore_errors: true
