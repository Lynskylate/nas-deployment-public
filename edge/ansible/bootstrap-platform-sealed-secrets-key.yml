---
- name: Bootstrap Sealed Secrets private key from vault
  hosts: edge_tencent
  become: true
  gather_facts: false

  vars:
    sealed_secrets_key_runtime_path: >-
      {{ playbook_dir }}/../../.vault/repo/infra/sealed-secrets/key-backup.runtime.yaml

  tasks:
    - name: Check if decrypted private key file is available
      ansible.builtin.stat:
        path: "{{ sealed_secrets_key_runtime_path }}"
      register: ss_key_file

    - name: Fail if private key file is missing
      ansible.builtin.fail:
        msg: >-
          Sealed Secrets private key not found at {{ sealed_secrets_key_runtime_path }}.
          Ensure bootstrap-deploy-env action decrypts
          vault:infra/sealed-secrets/key-backup.enc.yaml before running this playbook.
      when: not ss_key_file.stat.exists

    - name: Ensure kube-system namespace exists
      ansible.builtin.shell: |
        k3s kubectl create namespace kube-system --dry-run=client -o yaml \
          | k3s kubectl apply -f -
      changed_when: false

    - name: Check if Sealed Secrets private key already exists in cluster
      ansible.builtin.shell: |
        k3s kubectl get secret -n kube-system \
          -l sealedsecrets.bitnami.com/sealed-secrets-key \
          -o jsonpath='{.items}' 2>/dev/null
      register: ss_existing_keys
      changed_when: false
      failed_when: false

    - name: Apply private key Secret from vault
      ansible.builtin.shell: |
        k3s kubectl apply -f "{{ sealed_secrets_key_runtime_path }}"
      changed_when: false
      when: ss_existing_keys.stdout | default('[]') == '[]'

    - name: Verify private key Secret was applied
      ansible.builtin.shell: |
        k3s kubectl get secret -n kube-system \
          -l sealedsecrets.bitnami.com/sealed-secrets-key \
          -o jsonpath='{.items[0].metadata.name}'
      register: ss_key_name
      changed_when: false
      failed_when: ss_key_name.stdout | length == 0

    - name: Show bootstrap result
      ansible.builtin.debug:
        msg:
          - "Sealed Secrets private key: {{ ss_key_name.stdout }}"
          - "Action: {{ 'restored from vault' if ss_existing_keys.stdout | default('[]') == '[]' else 'already exists, skipped' }}"
