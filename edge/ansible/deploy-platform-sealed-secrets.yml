---
- name: Ensure Sealed Secrets is managed by ArgoCD
  hosts: edge_tencent
  become: true
  gather_facts: false

  tasks:
    - name: Check ArgoCD Application for sealed-secrets exists
      ansible.builtin.shell: |
        k3s kubectl -n argocd get application sealed-secrets -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "MISSING"
      register: argocd_sealed_app
      changed_when: false
      failed_when: false

    - name: Fail if sealed-secrets ArgoCD Application is missing
      ansible.builtin.fail:
        msg: >
          ArgoCD Application 'sealed-secrets' not found in namespace 'argocd'.
          Deploy ArgoCD first, then ensure platform/applications/sealed-secrets.yaml is synced.
      when: argocd_sealed_app.stdout == 'MISSING'

    - name: Wait for Sealed Secrets controller to be deployed by ArgoCD
      ansible.builtin.shell: |
        k3s kubectl -n kube-system rollout status deployment/sealed-secrets --timeout=120s
      register: sealed_secrets_rollout
      changed_when: false
      failed_when: sealed_secrets_rollout.rc != 0

    - name: Show deployment status
      ansible.builtin.debug:
        msg:
          - "Sealed Secrets is managed by ArgoCD (Helm chart bitnami-labs.github.io/sealed-secrets)."
          - "ArgoCD sync status: {{ argocd_sealed_app.stdout }}"
          - "Controller rollout: {{ sealed_secrets_rollout.stdout }}"
          - ""
          - "The Ansible deploy playbook no longer deploys SealedSecrets directly."
          - "All K8s resources must go through ArgoCD GitOps."
