---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: vector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vector
    spec:
      # Sources (envoy dropped), network-monitor.log + mihomo journal only exist on gtr.
      nodeSelector:
        kubernetes.io/hostname: gtr
      # hostNetwork so get_hostname!() == "gtr" (matches the old host Vector's .host).
      # ClusterFirstWithHostNet is REQUIRED so the pod still resolves cluster DNS
      # (the VictoriaLogs sink uses victorialogs-...monitoring.svc).
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: vector
          image: timberio/vector:0.53.0-debian
          args: ["--config", "/etc/vector/vector.yaml"]
          # Run as root to read journald (systemd-journal group) + host log files.
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: nm-logs
              mountPath: /var/log/network-monitor
              readOnly: true
            - name: journal
              mountPath: /var/log/journal
              readOnly: true
            - name: run-journal
              mountPath: /run/log/journal
              readOnly: true
            - name: machine-id
              mountPath: /etc/machine-id
              readOnly: true
            - name: data
              mountPath: /var/lib/vector
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: nm-logs
          hostPath:
            path: /var/log/network-monitor
            type: DirectoryOrCreate
        - name: journal
          hostPath:
            path: /var/log/journal
            type: DirectoryOrCreate
        - name: run-journal
          hostPath:
            path: /run/log/journal
            type: DirectoryOrCreate
        - name: machine-id
          hostPath:
            path: /etc/machine-id
            type: FileOrCreate
        - name: data
          hostPath:
            path: /var/lib/vector
            type: DirectoryOrCreate
