---
- name: Deploy K3s server on aliyun
  hosts: edge_aliyun
  become: true
  gather_facts: false

  roles:
    - role: k3s-prereq
    - role: k3s-server
    - role: tailscale-p2p-heal

- name: Apply K3s node labels
  hosts: edge_aliyun
  become: true

  tasks:
    - name: Apply node labels
      ansible.builtin.command: "k3s kubectl label node {{ inventory_hostname }} {{ item.key }}={{ item.value }} --overwrite"
      loop: "{{ k3s_node_labels | default({}) | dict2items }}"
      changed_when: false
      failed_when: false
