---
# Optimized: merged check + systemd + verify into one shell block

- name: Check tailscale status and ensure service is running
  ansible.builtin.shell: |
    set -e
    tailscale_bin=$(which tailscale 2>/dev/null || echo "")
    if [ -z "$tailscale_bin" ]; then
      exit 2
    fi
    systemctl is-active tailscaled >/dev/null 2>&1 || systemctl start tailscaled 2>/dev/null || true
    tailscale version 2>/dev/null || true
  register: edge_tailscale_info
  changed_when: false
  failed_when: edge_tailscale_info.rc not in [0, 2]

- name: Install tailscale when missing
  ansible.builtin.package:
    name: tailscale
    state: present
  when: edge_tailscale_info.rc == 2

- name: Ensure tailscaled is running after install
  ansible.builtin.shell: |
    set -e
    systemctl enable --now tailscaled
    tailscale version 2>/dev/null || true
  changed_when: false
  when: edge_tailscale_info.rc == 2

- name: Read current tailscale accept-dns setting
  ansible.builtin.shell: |
    set -o pipefail
    tailscale debug prefs 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(str(d.get('CorpDNS', True)).lower())"
  args:
    executable: /bin/bash
  register: edge_tailscale_corp_dns
  changed_when: false
  failed_when: false

- name: Apply desired tailscale accept-dns setting
  ansible.builtin.command: >-
    tailscale set --accept-dns={{ (edge_tailscale_accept_dns | bool) | ternary('true', 'false') }}
  register: edge_tailscale_set_dns
  changed_when: edge_tailscale_set_dns.rc == 0
  when: >-
    (edge_tailscale_corp_dns.stdout | trim | lower)
    != ((edge_tailscale_accept_dns | bool) | ternary('true', 'false'))

- name: Check systemd-resolved stub resolver path when tailscale DNS is disabled
  ansible.builtin.stat:
    path: "{{ edge_tailscale_resolv_conf_stub_path }}"
  register: edge_tailscale_stub_resolv_conf
  when: not (edge_tailscale_accept_dns | bool)

- name: Assert systemd-resolved stub resolver exists when tailscale DNS is disabled
  ansible.builtin.assert:
    that:
      - edge_tailscale_stub_resolv_conf.stat.exists
    fail_msg: >-
      Tailscale DNS 已禁用，但 systemd-resolved stub 不存在：
      {{ edge_tailscale_resolv_conf_stub_path }}
  when: not (edge_tailscale_accept_dns | bool)

- name: Restore /etc/resolv.conf to systemd-resolved stub when tailscale DNS is disabled
  ansible.builtin.file:
    path: "{{ edge_tailscale_resolv_conf_path }}"
    src: "{{ edge_tailscale_resolv_conf_stub_path }}"
    state: link
    force: true
  when: not (edge_tailscale_accept_dns | bool)
