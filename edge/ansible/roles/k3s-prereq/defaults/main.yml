---
k3s_prereq_packages:
  - curl
  - ca-certificates
  - conntrack
  - ebtables
  - ethtool
  - iptables
  - nfs-common
  - socat

k3s_prereq_modules:
  - overlay
  - br_netfilter
  - wireguard

k3s_prereq_sysctls:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1

# Enable tailscale --netfilter-mode=nodivert for cloud nodes with 100.x CGNAT conflict.
# Prevents Tailscale from injecting iptables rules that DROP 100.64.0.0/10
# traffic not arriving on tailscale0, which breaks cloud provider internal services.
k3s_prereq_tailscale_nodivert: false
