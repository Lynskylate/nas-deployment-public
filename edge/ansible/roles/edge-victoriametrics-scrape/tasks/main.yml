---
- name: Check VictoriaMetrics scrape config exists
  ansible.builtin.stat:
    path: "{{ edge_vm_scrape_config_path }}"
  register: edge_vm_config

- name: Fail when VictoriaMetrics scrape config is missing
  ansible.builtin.fail:
    msg: "VictoriaMetrics scrape config not found: {{ edge_vm_scrape_config_path }}"
  when: not edge_vm_config.stat.exists

- name: Read current VictoriaMetrics scrape config
  ansible.builtin.slurp:
    src: "{{ edge_vm_scrape_config_path }}"
  register: edge_vm_config_raw

- name: Parse current VictoriaMetrics scrape config
  ansible.builtin.set_fact:
    edge_vm_parsed_config: "{{ edge_vm_config_raw.content | b64decode | from_yaml }}"

- name: Build scrape jobs without previous edge-proxy entries
  ansible.builtin.set_fact:
    edge_vm_existing_scrape_configs: "{{ edge_vm_parsed_config.scrape_configs | default([]) }}"
    edge_vm_edge_job_names: "{{ edge_proxy_vm_scrape_jobs | map(attribute='job_name') | list }}"

- name: Remove old edge-proxy scrape jobs before merge
  ansible.builtin.set_fact:
    edge_vm_merged_scrape_configs: "{{ edge_vm_existing_scrape_configs | rejectattr('job_name', 'in', edge_vm_edge_job_names) | list }}"

- name: Append edge-proxy scrape jobs
  ansible.builtin.set_fact:
    edge_vm_merged_scrape_configs: "{{ edge_vm_merged_scrape_configs + [ {
      'job_name': item.job_name,
      'scrape_interval': item.scrape_interval | default('15s'),
      'metrics_path': item.metrics_path | default('/metrics'),
      'static_configs': [
        {
          'targets': [ item.target ],
          'labels': item.labels | default({})
        }
      ]
    } ] }}"
  loop: "{{ edge_proxy_vm_scrape_jobs }}"

- name: Write merged VictoriaMetrics scrape config
  ansible.builtin.copy:
    content: "{{ {'scrape_configs': edge_vm_merged_scrape_configs} | to_nice_yaml(indent=2) }}"
    dest: "{{ edge_vm_scrape_config_path }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: restart victoriametrics

- name: Flush VictoriaMetrics restart handler
  ansible.builtin.meta: flush_handlers

- name: Wait for VictoriaMetrics HTTP port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 8428
    timeout: 60
