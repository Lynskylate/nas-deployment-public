---
- name: Bootstrap Sealed Secrets private key from vault
  hosts: edge_tencent
  become: true
  gather_facts: false

  vars:
    sealed_secrets_key_runtime_path: >-
      {{ playbook_dir }}/../../.vault/repo/infra/sealed-secrets/key-backup.runtime.yaml
    sealed_secrets_key_remote_path: /tmp/sealed-secrets-key-from-vault.yaml
    sealed_secrets_controller_deployment: sealed-secrets

  tasks:
    - name: Check if decrypted private key file is available on controller
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ sealed_secrets_key_runtime_path }}"
      register: ss_key_file

    - name: Ensure kube-system namespace exists
      ansible.builtin.shell: |
        k3s kubectl create namespace kube-system --dry-run=client -o yaml \
          | k3s kubectl apply -f -
      changed_when: false

    - name: Collect existing Sealed Secrets private key fingerprints
      ansible.builtin.shell: |
        set -euo pipefail
        k3s kubectl get secret -n kube-system \
          -l sealedsecrets.bitnami.com/sealed-secrets-key \
          -o json > /tmp/ss-keys.json 2>/dev/null || echo '{"items":[]}' > /tmp/ss-keys.json
        python3 /dev/stdin << 'PYEOF'
        import json, base64, subprocess
        with open('/tmp/ss-keys.json') as f:
            data = json.load(f)
        result = {}
        for item in data.get('items', []):
            name = item['metadata']['name']
            cert_b64 = item['data']['tls.crt']
            cert = base64.b64decode(cert_b64)
            proc = subprocess.run(['openssl','x509','-noout','-fingerprint','-sha256'],
                                  input=cert, capture_output=True)
            fp = proc.stdout.decode().split('=')[-1].strip()
            result[name] = fp
        print(json.dumps(result))
        PYEOF
      args:
        executable: /bin/bash
      register: ss_existing_key_fingerprints_json
      changed_when: false
      failed_when: false

    - name: Parse existing Sealed Secrets private key fingerprints
      ansible.builtin.set_fact:
        ss_existing_key_fingerprints: "{{ ss_existing_key_fingerprints_json.stdout | trim | from_json }}"

    - name: Derive existing Sealed Secrets private key names
      ansible.builtin.set_fact:
        ss_existing_key_names: "{{ ss_existing_key_fingerprints | dict2items | map(attribute='key') | list }}"

    - name: Fail only when vault backup is missing and cluster has no existing key
      ansible.builtin.fail:
        msg: >-
          Sealed Secrets private key not found at {{ sealed_secrets_key_runtime_path }},
          and cluster currently has no existing Sealed Secrets private key.
          Ensure bootstrap-deploy-env action decrypts
          vault:infra/sealed-secrets/key-backup.enc.yaml before running this playbook.
      when:
        - not ss_key_file.stat.exists
        - ss_existing_key_names | length == 0

    - name: Load vault private key manifest from controller
      delegate_to: localhost
      become: false
      ansible.builtin.set_fact:
        ss_vault_key_manifest: "{{ lookup('ansible.builtin.file', sealed_secrets_key_runtime_path) | from_yaml }}"
      when: ss_key_file.stat.exists

    - name: Derive vault private key Secret object
      ansible.builtin.set_fact:
        ss_vault_key_secret: >-
          {{
            ss_vault_key_manifest['items'][0]
            if ss_vault_key_manifest.get('kind', '') == 'List'
            else ss_vault_key_manifest
          }}
      when: ss_key_file.stat.exists

    - name: Compute vault private key certificate fingerprint
      delegate_to: localhost
      become: false
      ansible.builtin.shell: |
        set -euo pipefail
        printf '%s' '{{ ss_vault_key_secret["data"]["tls.crt"] }}' \
          | base64 -d \
          | openssl x509 -noout -fingerprint -sha256 \
          | cut -d= -f2
      args:
        executable: /bin/bash
      register: ss_vault_key_fingerprint
      changed_when: false
      no_log: true
      when: ss_key_file.stat.exists

    - name: Derive matching Sealed Secrets private keys by fingerprint
      ansible.builtin.set_fact:
        ss_matching_key_names: >-
          {{
            ss_existing_key_fingerprints
            | dict2items
            | selectattr('value', 'equalto', ss_vault_key_fingerprint.stdout | trim)
            | map(attribute='key')
            | list
          }}
      when: ss_key_file.stat.exists

    - name: Derive non-matching Sealed Secrets private keys
      ansible.builtin.set_fact:
        ss_nonmatching_key_names: >-
          {{
            ss_existing_key_fingerprints
            | dict2items
            | rejectattr('value', 'equalto', ss_vault_key_fingerprint.stdout | trim)
            | map(attribute='key')
            | list
          }}
      when: ss_key_file.stat.exists

    - name: Decide whether Sealed Secrets private key restore is needed
      ansible.builtin.set_fact:
        ss_should_restore: "{{ ss_matching_key_names | length == 0 }}"
      when: ss_key_file.stat.exists

    - name: Reuse existing cluster key when vault backup is unavailable
      ansible.builtin.set_fact:
        ss_matching_key_names: "{{ ss_existing_key_names }}"
        ss_nonmatching_key_names: []
        ss_should_restore: false
        ss_restored_key_name:
          stdout: "{{ ss_existing_key_names | first }}"
        ss_vault_key_fingerprint_display: unavailable
      when: not ss_key_file.stat.exists

    - name: Set vault private key fingerprint display value
      ansible.builtin.set_fact:
        ss_vault_key_fingerprint_display: "{{ ss_vault_key_fingerprint.stdout | trim }}"
      when: ss_key_file.stat.exists

    - name: Copy vault private key manifest to remote tmp path
      ansible.builtin.copy:
        src: "{{ sealed_secrets_key_runtime_path }}"
        dest: "{{ sealed_secrets_key_remote_path }}"
        owner: root
        group: root
        mode: "0600"
      when: ss_should_restore | bool
      no_log: true

    - name: Apply private key Secret from vault when fingerprint is missing
      ansible.builtin.shell: |
        k3s kubectl apply -f "{{ sealed_secrets_key_remote_path }}"
      changed_when: false
      when: ss_should_restore | bool

    - name: Remove remote tmp private key manifest
      ansible.builtin.file:
        path: "{{ sealed_secrets_key_remote_path }}"
        state: absent
      when: ss_should_restore | bool

    - name: Verify restored private key Secret exists by vault name
      ansible.builtin.command:
        argv:
          - k3s
          - kubectl
          - get
          - secret
          - -n
          - kube-system
          - "{{ ss_vault_key_secret['metadata']['name'] }}"
          - -o
          - jsonpath={.metadata.name}
      register: ss_restored_key_name
      changed_when: false
      when: ss_should_restore | bool

    - name: Record restored private key Secret name as matching key
      ansible.builtin.set_fact:
        ss_matching_key_names:
          - "{{ ss_restored_key_name.stdout }}"
      when: ss_should_restore | bool

    - name: Reuse matching private key Secret name when fingerprint already exists
      ansible.builtin.set_fact:
        ss_restored_key_name:
          stdout: "{{ ss_matching_key_names | first }}"
      when: not (ss_should_restore | bool)

    - name: Remove non-matching Sealed Secrets private keys
      ansible.builtin.command:
        argv:
          - k3s
          - kubectl
          - delete
          - secret
          - -n
          - kube-system
          - "{{ item }}"
      loop: "{{ ss_nonmatching_key_names }}"
      changed_when: false
      when: ss_nonmatching_key_names | length > 0

    - name: Restart Sealed Secrets controller after restore or key pruning
      ansible.builtin.command:
        argv:
          - k3s
          - kubectl
          - -n
          - kube-system
          - rollout
          - restart
          - "deployment/{{ sealed_secrets_controller_deployment }}"
      changed_when: false
      when:
        - ss_should_restore | bool or (ss_nonmatching_key_names | length > 0)

    - name: Wait for Sealed Secrets controller rollout after restore or key pruning
      ansible.builtin.command:
        argv:
          - k3s
          - kubectl
          - -n
          - kube-system
          - rollout
          - status
          - "deployment/{{ sealed_secrets_controller_deployment }}"
          - --timeout=120s
      changed_when: false
      when:
        - ss_should_restore | bool or (ss_nonmatching_key_names | length > 0)

    - name: Show bootstrap result
      ansible.builtin.debug:
        msg:
          - "Sealed Secrets private key: {{ ss_restored_key_name.stdout }}"
          - "Vault key fingerprint: {{ ss_vault_key_fingerprint_display }}"
          - "Matching cluster keys: {{ ss_matching_key_names | join(', ') if (ss_matching_key_names | length > 0) else 'none' }}"
          - "Pruned non-matching keys: {{ ss_nonmatching_key_names | join(', ') if (ss_nonmatching_key_names | length > 0) else 'none' }}"
          - >-
            Action: {{
              'restored from vault'
              if (ss_should_restore | bool)
              else (
                'existing cluster key retained because vault backup is unavailable'
                if not ss_key_file.stat.exists
                else 'matching fingerprint already exists, skipped'
              )
            }}
