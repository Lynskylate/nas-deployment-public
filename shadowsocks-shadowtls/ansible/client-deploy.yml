---
# Deploy Shadowsocks + Shadow-TLS client + Envoy SNI passthrough to GTR
# Usage: ansible-playbook -i inventory.ini client-deploy.yml

- name: Deploy Shadowsocks + Shadow-TLS Client
  hosts: client_server
  become: true

  pre_tasks:
    - name: Display deployment info
      ansible.builtin.debug:
        msg:
          - "Deploying to client server: {{ inventory_hostname }}"
          - "Remote server: {{ remote_server_ip }}"

    - name: Check if remote server is ready
      ansible.builtin.wait_for:
        host: "{{ remote_server_ip }}"
        port: "{{ shadowtls_tls_port }}"
        timeout: 10
      ignore_errors: true
      register: remote_check

    - name: Warn if remote server not reachable
      ansible.builtin.debug:
        msg: "WARNING: Remote server {{ remote_server_ip }}:{{ shadowtls_tls_port }} not reachable. Please deploy server first."
      when: remote_check.failed

  roles:
    - role: shadowsocks-client
    - role: shadowtls-client
    - role: envoy-sni-config

  post_tasks:
    - name: Restart services in dependency order
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
        daemon_reload: true
      loop:
        - shadowsocks-client
        - shadow-tls-client
        - envoy

    - name: Wait for services to start
      ansible.builtin.wait_for:
        timeout: 5

    - name: Verify services are running
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
      loop:
        - shadowsocks-client
        - shadow-tls-client
        - envoy

    - name: Check port listening
      ansible.builtin.shell: |
        ss -tulnp | grep -E ':({{ shadowsocks_client_port }}|{{ shadowtls_client_listen_port }}|{{ shadowtls_tls_port }})' || echo "Port check failed"
      register: port_check
      changed_when: false

    - name: Display port status
      ansible.builtin.debug:
        var: port_check.stdout_lines

    - name: Check Envoy listeners
      ansible.builtin.uri:
        url: "http://localhost:9901/listeners"
        return_content: true
      register: envoy_listeners
      until: envoy_listeners.status == 200
      retries: 5
      delay: 2

    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "✓ Shadowsocks client installed and running"
          - "✓ Shadow-TLS client installed and running"
          - "✓ Envoy SNI passthrough configured"
          - ""
          - "Next steps:"
          - "1. Verify connection: ansible-playbook -i inventory.ini verify.yml"
          - "2. Test proxy: curl --socks5 127.0.0.1:{{ shadowsocks_client_port }} https://api.ipify.org"
