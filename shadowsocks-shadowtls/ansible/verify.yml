---
# Verify Shadowsocks + Shadow-TLS + Monitoring deployment
# Usage: ansible-playbook -i inventory.ini verify.yml

- name: Verify Remote Server
  hosts: remote_server
  become: true

  tasks:
    - name: Check service status
      ansible.builtin.systemd:
        name: "{{ item }}"
      register: services
      loop:
        - shadowsocks-server
        - shadow-tls-server
        - envoy
        - node_exporter

    - name: Display service status
      ansible.builtin.debug:
        msg:
          - "{{ item.item }}: {{ item.status.ActiveState }}"
      loop: "{{ services.results }}"

    - name: Check ports
      ansible.builtin.shell: |
        echo "=== Envoy Public Port (443) ==="
        ss -tulnp | grep ':443'
        echo "=== Shadowsocks Server Port ==="
        ss -tulnp | grep ':{{ shadowsocks_server_port }}'
        echo "=== Shadow-TLS Server Port (local) ==="
        ss -tulnp | grep ':{{ shadowtls_server_listen_port }}'
        echo "=== Node Exporter Port (local) ==="
        ss -tulnp | grep ':{{ node_exporter_port }}'
        echo "=== Envoy Admin Port (local) ==="
        ss -tulnp | grep ':{{ envoy_admin_port }}'
      register: ports
      changed_when: false

    - name: Display port status
      ansible.builtin.debug:
        var: ports.stdout_lines

    - name: Test Envoy admin interface
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ envoy_admin_port }}/stats"
        return_content: true
      register: envoy_stats
      ignore_errors: true

    - name: Test metrics endpoint through Envoy
      ansible.builtin.uri:
        url: "http://127.0.0.1:443/metrics"
        return_content: true
      register: metrics_response
      ignore_errors: true

    - name: Display metrics test result
      ansible.builtin.debug:
        msg:
          - "Envoy Admin: {{ 'OK' if envoy_stats.failed == false else 'FAILED' }}"
          - "Metrics Endpoint: {{ 'OK (' + metrics_response.content.split('\n') | length | string + ' lines)' if metrics_response.failed == false else 'FAILED' }}"
      when: metrics_response is defined

    - name: Get recent logs from envoy
      ansible.builtin.shell: journalctl -u envoy -n 10 --no-pager
      register: envoy_logs
      changed_when: false

    - name: Get recent logs from shadowsocks-server
      ansible.builtin.shell: journalctl -u shadowsocks-server -n 10 --no-pager
      register: ss_logs
      changed_when: false

    - name: Get recent logs from shadow-tls-server
      ansible.builtin.shell: journalctl -u shadow-tls-server -n 10 --no-pager
      register: stls_logs
      changed_when: false

    - name: Get recent logs from node_exporter
      ansible.builtin.shell: journalctl -u node_exporter -n 10 --no-pager
      register: ne_logs
      changed_when: false

- name: Verify Client Server
  hosts: client_server
  become: true

  tasks:
    - name: Check service status
      ansible.builtin.systemd:
        name: "{{ item }}"
      register: services
      loop:
        - shadowsocks-client
        - shadow-tls-client
        - envoy
        - victoriametrics

    - name: Display service status
      ansible.builtin.debug:
        msg:
          - "{{ item.item }}: {{ item.status.ActiveState }}"
      loop: "{{ services.results }}"

    - name: Check ports
      ansible.builtin.shell: |
        echo "=== SOCKS5 Proxy Port ==="
        ss -tulnp | grep ':{{ shadowsocks_client_port }}'
        echo "=== Shadow-TLS Client Port ==="
        ss -tulnp | grep ':{{ shadowtls_client_listen_port }}'
        echo "=== Envoy TLS Passthrough Port ==="
        ss -tulnp | grep ':{{ shadowtls_tls_port }}'
        echo "=== VictoriaMetrics Port ==="
        ss -tulnp | grep ':8428'
      register: ports
      changed_when: false

    - name: Display port status
      ansible.builtin.debug:
        var: ports.stdout_lines

    - name: Check Envoy listeners
      ansible.builtin.uri:
        url: "http://localhost:9901/listeners"
        return_content: true
      register: envoy_listeners

    - name: Display Envoy listeners
      ansible.builtin.debug:
        msg: "{{ envoy_listeners.json | to_json(indent=2) }}"
      when: envoy_listeners.json is defined

    - name: Check VictoriaMetrics scrape targets
      ansible.builtin.uri:
        url: "http://localhost:8428/api/v1/targets"
        return_content: true
      register: vm_targets

    - name: Display VictoriaMetrics targets
      ansible.builtin.debug:
        msg: "{{ vm_targets.json | to_json(indent=2) }}"
      when: vm_targets.json is defined

    - name: Query remote server metrics
      ansible.builtin.uri:
        url: "http://localhost:8428/api/v1/query?query=up{job=~'.*remote.*'}"
        return_content: true
      register: remote_metrics

    - name: Display remote server metrics
      ansible.builtin.debug:
        msg: "{{ remote_metrics.json | to_json(indent=2) }}"
      when: remote_metrics.json is defined

    - name: Test SOCKS5 proxy connectivity
      ansible.builtin.shell: |
        timeout 10 curl --socks5 127.0.0.1:{{ shadowsocks_client_port }} https://api.ipify.org 2>&1 || echo "Test failed"
      register: proxy_test
      changed_when: false
      ignore_errors: true

    - name: Display proxy test result
      ansible.builtin.debug:
        msg: "{{ proxy_test.stdout_lines }}"

- name: End-to-End Test Summary
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - "=== Deployment Verification Complete ==="
          - ""
          - "Manual tests to run:"
          - "1. On GTR server: curl --socks5 127.0.0.1:{{ shadowsocks_client_port }} https://api.ipify.org"
          - "2. On GTR server: curl --socks5 127.0.0.1:{{ shadowsocks_client_port }} https://www.google.com"
          - "3. Check logs: journalctl -u shadow-tls-client -f"
          - "4. Check metrics: curl http://gtr:8428/api/v1/targets"
          - ""
          - "Monitoring endpoints:"
          - " - Remote server metrics: http://{{ remote_server_ip }}:443/metrics"
          - " - VictoriaMetrics: http://gtr:8428/vmui"
          - " - Grafana: http://gtr:3000"
          - ""
          - "Expected result: IP returned should be {{ remote_server_ip }}"
