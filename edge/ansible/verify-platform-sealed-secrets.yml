---
- name: Verify Sealed Secrets controller (ArgoCD-managed)
  hosts: edge_tencent
  become: true
  gather_facts: false

  tasks:
    - name: Check Sealed Secrets controller pod
      ansible.builtin.shell: |
        k3s kubectl -n kube-system get pods -l app.kubernetes.io/name=sealed-secrets -o wide
      register: sealed_secrets_pods
      changed_when: false
      failed_when: false

    - name: Check Sealed Secrets controller deployment
      ansible.builtin.shell: |
        k3s kubectl -n kube-system rollout status deployment/sealed-secrets --timeout=10s
      register: sealed_secrets_deploy
      changed_when: false
      failed_when: sealed_secrets_deploy.rc != 0

    - name: Show Sealed Secrets summary
      ansible.builtin.debug:
        msg:
          - "=== Sealed Secrets Verification ==="
          - "Controller (ArgoCD Helm chart):"
          - "{{ sealed_secrets_pods.stdout | default('NOT FOUND') }}"
          - ""
          - "Controller rollout: {{ sealed_secrets_deploy.stdout | default('check failed') }}"
          - ""
          - "SealedSecrets is managed by ArgoCD Application (platform/applications/sealed-secrets.yaml)."
          - "Do NOT use kubectl apply to deploy it directly."
          - ""
          - "To seal a secret locally:"
          - "  kubeseal --controller-name=sealed-secrets --controller-namespace=kube-system \\"
          - "    --scope namespace-wide -o yaml < secret.yaml > sealedsecret.yaml"
          - ""
          - "NOTE: do NOT use kubeseal --raw mode (broken in v0.37.0)."
