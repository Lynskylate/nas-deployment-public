---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      # Pinned to gtr: the data dir is a gtr-local hostPath (dashboards are
      # ConfigMap-provisioned; this only holds grafana's sqlite state).
      nodeSelector:
        kubernetes.io/hostname: gtr
      containers:
        - name: grafana
          image: grafana/grafana:11.5.1
          # Run as root: the data dir is a root-owned hostPath (uid 472 can't write).
          securityContext:
            runAsUser: 0
          ports:
            - containerPort: 3000
              name: http
          env:
            # Match the prior host grafana defaults (admin/admin, anonymous off).
            - {name: GF_SECURITY_ADMIN_USER, value: "admin"}
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: "admin"}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
            # The Tailscale operator fronts this at https://grafana.tail414c32.ts.net
            - {name: GF_SERVER_ROOT_URL, value: "%(protocol)s://grafana.tail414c32.ts.net/"}
            - {name: GF_SERVER_DOMAIN, value: "grafana.tail414c32.ts.net"}
          readinessProbe:
            httpGet: {path: /api/health, port: 3000}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /api/health, port: 3000}
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - {name: cfg-datasources, mountPath: /etc/grafana/provisioning/datasources, readOnly: true}
            - {name: cfg-dashboardprovider, mountPath: /etc/grafana/provisioning/dashboards, readOnly: true}
            - {name: dashboards, mountPath: /var/lib/grafana/dashboards, readOnly: true}
            - {name: data, mountPath: /var/lib/grafana}
      volumes:
        - {name: cfg-datasources, configMap: {name: grafana-datasources}}
        - {name: cfg-dashboardprovider, configMap: {name: grafana-dashboard-provider}}
        # Dashboards split across 2 ConfigMaps (one dashboard alone is 682KB;
        # combined exceeds the ~1MB single-ConfigMap limit). Projected volume
        # merges both into /var/lib/grafana/dashboards.
        - name: dashboards
          projected:
            sources:
              - configMap: {name: grafana-dashboards-a}
              - configMap: {name: grafana-dashboards-b}
        - name: data
          hostPath:
            path: /var/lib/grafana-k3s
            type: DirectoryOrCreate
