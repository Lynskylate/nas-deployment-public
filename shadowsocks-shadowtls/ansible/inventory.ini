# Shadowsocks + Shadow-TLS Deployment Inventory
# Format: ansible-playbook -i inventory.ini <playbook>.yml

[remote_server]
# Remote proxy server (shadow-tls server + shadowsocks server)
cloudcone ansible_host=66.154.100.187 ansible_user=root ansible_port=22 ansible_ssh_private_key_file=~/.ssh/id_ed25519

[client_server]
# GTR client server (shadow-tls client + shadowsocks client + envoy)
gtr ansible_user=root

[all:vars]
# Common variables
ansible_python_interpreter=/usr/bin/python3
