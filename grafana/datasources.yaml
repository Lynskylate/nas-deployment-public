# Configuration file version
apiVersion: 1

# List of data sources to insert/update
#
# Post-migration: using K8s in-cluster Service DNS.
# If Grafana remains bare-metal, replace these with:
#   http://100.121.0.67:8428 (GTR Tailscale IP for VM)
#   http://100.121.0.67:8429 (GTR Tailscale IP for VL)
#   http://100.121.0.67:9428 (GTR Tailscale IP for VT)
# or expose the Services via Tailscale Operator (tailscale.com/expose annotations).
datasources:
  # VictoriaMetrics - 时序指标数据
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    orgId: 1
    uid: victoriametrics
    url: http://victoriametrics.monitoring.svc:8428
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  # VictoriaLogs - 日志数据
  - name: VictoriaLogs
    type: victoriametrics-logs-datasource
    access: proxy
    orgId: 1
    uid: victorialogs
    url: http://victorialogs.monitoring.svc:8429
    isDefault: false
    editable: true
    jsonData:
      timeInterval: 15s

  # VictoriaTraces - 分布式追踪数据（Jaeger 兼容 API）
  - name: VictoriaTraces
    type: jaeger
    access: proxy
    orgId: 1
    uid: victoriatraces
    url: http://victoriatraces.monitoring.svc:9428/select/jaeger
    isDefault: false
    editable: true
