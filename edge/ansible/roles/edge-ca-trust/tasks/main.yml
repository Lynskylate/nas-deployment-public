---
- name: Check root CA cert on control node
  ansible.builtin.stat:
    path: "{{ edge_ca_root_cert }}"
  register: ca_cert_stat
  delegate_to: localhost
  become: false

- name: Assert root CA cert exists
  ansible.builtin.assert:
    that:
      - ca_cert_stat.stat.exists
    fail_msg: "Root CA cert missing at {{ edge_ca_root_cert }}"

- name: Install root CA into system trust store
  ansible.builtin.copy:
    src: "{{ edge_ca_root_cert }}"
    dest: "{{ edge_ca_trust_target_path }}"
    owner: root
    group: root
    mode: "0644"
  register: trust_copy

- name: Refresh trust store on Debian/Ubuntu
  ansible.builtin.command: update-ca-certificates
  when:
    - ansible_os_family == 'Debian'
    - trust_copy.changed

- name: Refresh trust store on RedHat family
  ansible.builtin.command: update-ca-trust extract
  when:
    - ansible_os_family == 'RedHat'
    - trust_copy.changed
