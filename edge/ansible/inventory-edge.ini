[edge_remote_proxy]
remote_proxy ansible_host=100.66.156.40 ansible_user=ci ansible_port=22

[edge_aliyun]
# aliyun Tailscale 直连不可用（阿里云 NAT 随机化 UDP 源端口 + 运营商丢包），
# CI 部署走公网 IP 保证可靠性。K3s 内部通信仍走 Tailscale (100.100.99.70)。
# 详见 docs/issues/010-aliyun-reinstall-tailscale-diagnostics.md
aliyun ansible_host=47.120.46.128 ansible_user=ci ansible_port=22

[edge_tencent]
tencent ansible_host=100.99.48.76 ansible_user=ci ansible_port=22

[edge_hosts:children]
edge_remote_proxy
edge_aliyun
edge_tencent

[gtr_core]
gtr ansible_host=gtr.tail414c32.ts.net ansible_user=ci ansible_port=22

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_become_timeout=30
