---
# Mihomo Integration for Monitoring
# Adds metrics (VictoriaMetrics) and logs (VictoriaLogs) support

# ============================================================
# Part 1: Enable Mihomo Prometheus Metrics
# ============================================================
# Add this to /etc/mihomo/config.yaml:

# metrics:
#   - name: mihomo_metrics
#     port: 9091
#     path: /metrics
#     # Or use external-controller metrics
#   # Mihomo v1.18+ supports metrics via external-controller
#   # Just add: external-controller: 0.0.0.0:9090
#   # Then access: http://127.0.0.1:9090/metrics

# ============================================================
# Part 2: Add to VictoriaMetrics Scrape Config
# ============================================================
# Add to /usr/local/victoriametrics/victoriametrics_sd.yaml:

scrape_configs:
  # ... existing configs ...

  - job_name: 'mihomo'
    scrape_interval: 15s
    static_configs:
      - targets: ['127.0.0.1:9090']
        labels:
          service: 'mihomo'
          server: 'gtr'
          env: 'production'
    metrics_path: /metrics
    # Optional: Basic auth if external-controller has secret
    # basic_auth:
    #   username: ''  # Leave empty, use Authorization header
    #   password: '<render-from-private-vault>'
    # Or use params for secret
    params:
      _: ['<render-from-private-vault>']

