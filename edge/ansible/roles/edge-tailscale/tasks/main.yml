---
# Optimized: merged check + systemd + verify into one shell block

- name: Check tailscale status and ensure service is running
  ansible.builtin.shell: |
    set -e
    tailscale_bin=$(which tailscale 2>/dev/null || echo "")
    if [ -z "$tailscale_bin" ]; then
      exit 2
    fi
    systemctl is-active tailscaled >/dev/null 2>&1 || systemctl start tailscaled 2>/dev/null || true
    tailscale version 2>/dev/null || true
  register: edge_tailscale_info
  changed_when: false
  failed_when: edge_tailscale_info.rc not in [0, 2]

- name: Install tailscale when missing
  ansible.builtin.package:
    name: tailscale
    state: present
  when: edge_tailscale_info.rc == 2

- name: Ensure tailscaled is running after install
  ansible.builtin.shell: |
    set -e
    systemctl enable --now tailscaled
    tailscale version 2>/dev/null || true
  changed_when: false
  when: edge_tailscale_info.rc == 2
