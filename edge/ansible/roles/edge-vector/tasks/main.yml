---
- name: Create vector user
  ansible.builtin.user:
    name: vector
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create vector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: vector
    group: vector
    mode: "0755"
  loop:
    - "{{ vector_config_dir }}"
    - "{{ vector_data_dir }}"
    - "{{ vector_log_path }}"

- name: Check if vector binary exists
  ansible.builtin.stat:
    path: "{{ vector_bin_path }}"
  register: vector_binary

- name: Create temporary directory for vector install
  ansible.builtin.tempfile:
    state: directory
    suffix: _vector
  register: vector_temp_dir
  when: not vector_binary.stat.exists

- name: Download and extract vector archive
  ansible.builtin.unarchive:
    src: "{{ vector_download_url }}/v{{ vector_version }}/vector-{{ vector_version }}-x86_64-unknown-linux-gnu.tar.gz"
    dest: "{{ vector_temp_dir.path }}"
    remote_src: true
    timeout: 300
  environment: "{{ {'http_proxy': github_download_proxy, 'https_proxy': github_download_proxy} if (github_download_proxy | default('') | length > 0) else {} }}"
  register: vector_download_result
  retries: 5
  delay: 10
  until: vector_download_result is succeeded
  when: not vector_binary.stat.exists

- name: Install vector binary
  ansible.builtin.copy:
    src: "{{ vector_temp_dir.path }}/{{ vector_archive_dirname }}/bin/vector"
    dest: "{{ vector_bin_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: not vector_binary.stat.exists
  notify: restart vector

- name: Deploy vector systemd service
  ansible.builtin.template:
    src: vector.service.j2
    dest: /etc/systemd/system/vector.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart vector

- name: Deploy vector config
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: "{{ vector_config_dir }}/vector.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: restart vector

- name: Flush vector handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure vector service is enabled and running
  ansible.builtin.systemd:
    name: vector
    enabled: true
    state: started
    daemon_reload: true

- name: Cleanup vector temp directory
  ansible.builtin.file:
    path: "{{ vector_temp_dir.path }}"
    state: absent
  when: not vector_binary.stat.exists
