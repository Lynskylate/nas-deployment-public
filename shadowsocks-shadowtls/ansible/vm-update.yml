---
# Update VictoriaMetrics scrape configuration
# Usage: ansible-playbook -i inventory.ini vm-update.yml

- name: Update VictoriaMetrics Scrape Configuration
  hosts: client_server
  become: true

  pre_tasks:
    - name: Display update info
      ansible.builtin.debug:
        msg:
          - "Updating VictoriaMetrics configuration on: {{ inventory_hostname }}"
          - "Remote edge-proxy to monitor: {{ remote_server_ip }}"
          - "Config path: {{ vm_config_path }}/{{ vm_scrape_config }}"

  roles:
    - role: victoriametrics-config

  post_tasks:
    - name: Verify VictoriaMetrics is running
      ansible.builtin.systemd:
        name: victoriametrics
        state: started

    - name: Check scrape targets
      ansible.builtin.uri:
        url: "http://127.0.0.1:8428/api/v1/targets"
        return_content: true
      register: targets_check

    - name: Display scrape targets
      ansible.builtin.debug:
        msg: "{{ targets_check.json | default('Failed to fetch targets') }}"

    - name: Query remote server metrics
      ansible.builtin.uri:
        url: "http://127.0.0.1:8428/api/v1/query?query=up{job=~'.*remote.*'}"
        return_content: true
      register: metrics_query

    - name: Display update summary
      ansible.builtin.debug:
        msg:
          - "✓ VictoriaMetrics configuration updated"
          - "✓ Unified scrape target ensured:"
          - "  - edge_proxy_remote_proxy ({{ remote_server_ip }}:80/metrics)"
          - ""
          - "View targets: http://{{ inventory_hostname }}:8428/api/v1/targets"
          - "Query metrics: http://{{ inventory_hostname }}:8428/vmui"
