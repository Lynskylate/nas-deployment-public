---
- name: Ensure cleanup state directory exists
  ansible.builtin.file:
    path: "{{ legacy_proxy_cleanup_marker | dirname }}"
    state: directory
    mode: "0755"

- name: Check if legacy cleanup already finished
  ansible.builtin.stat:
    path: "{{ legacy_proxy_cleanup_marker }}"
  register: cleanup_marker

- name: Gather service facts before cleanup
  ansible.builtin.service_facts:
  when: not cleanup_marker.stat.exists

- name: Stop, disable and mask legacy proxy services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop: "{{ legacy_proxy_services }}"
  when:
    - not cleanup_marker.stat.exists
    - ansible_facts.services is defined
    - (item + '.service') in ansible_facts.services

- name: Remove legacy proxy files and directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ legacy_proxy_paths }}"
  when: not cleanup_marker.stat.exists

- name: Mark cleanup complete
  ansible.builtin.copy:
    dest: "{{ legacy_proxy_cleanup_marker }}"
    content: |
      cleaned_at={{ ansible_date_time.iso8601 }}
      host={{ inventory_hostname }}
    mode: "0644"
  when: not cleanup_marker.stat.exists
