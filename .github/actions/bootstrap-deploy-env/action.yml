name: Bootstrap Deploy Environment
description: Checkout the private vault repo, decrypt deployment secrets, and render runtime files.

inputs:
  vault_repo_slug:
    description: Private vault repository slug.
    required: true
  vault_repo_ssh_key:
    description: Read-only deploy key used to checkout the vault repository.
    required: true
  sops_age_key:
    description: AGE private key material used by sops for decryption.
    required: true

outputs:
  ts_oauth_client_id:
    description: Tailscale OAuth client ID for deploy jobs.
    value: ${{ steps.render.outputs.ts_oauth_client_id }}
  ts_oauth_secret:
    description: Tailscale OAuth client secret for deploy jobs.
    value: ${{ steps.render.outputs.ts_oauth_secret }}

runs:
  using: composite
  steps:
    - name: Checkout vault repository
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.vault_repo_slug }}
        ssh-key: ${{ inputs.vault_repo_ssh_key }}
        path: .vault/repo
        fetch-depth: 1
        persist-credentials: false

    - name: Install deployment dependencies
      shell: bash
      run: |
        set -euo pipefail
        python3 -m pip install --user ansible pyyaml
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        if ! command -v age >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y age
        fi
        if ! command -v sops >/dev/null 2>&1; then
          curl -fsSL \
            https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 \
            -o /tmp/sops
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
        fi

    - id: render
      name: Decrypt bootstrap values and render runtime overlays
      shell: bash
      env:
        INPUT_SOPS_AGE_KEY: ${{ inputs.sops_age_key }}
      run: |
        set -euo pipefail
        mkdir -p \
          "$RUNNER_TEMP/sops-age" \
          "$HOME/.ssh" \
          edge/ansible/group_vars/all \
          edge/ansible/host_vars/gtr \
          mihomo/ansible/group_vars/all \
          mihomo/ansible/group_vars/aliyun \
          grafana

        age_key_file="$RUNNER_TEMP/sops-age/keys.txt"
        printf '%s\n' "$INPUT_SOPS_AGE_KEY" > "$age_key_file"
        chmod 600 "$age_key_file"
        export SOPS_AGE_KEY_FILE="$age_key_file"

        bootstrap_file="$RUNNER_TEMP/bootstrap.yml"
        sops --decrypt .vault/repo/bootstrap/github-actions/prod.sops.yml > "$bootstrap_file"
        sops --decrypt .vault/repo/ansible/edge/group_vars/all/secret.sops.yml > edge/ansible/group_vars/all/secret.runtime.yml
        sops --decrypt .vault/repo/ansible/edge/host_vars/gtr/secret.sops.yml > edge/ansible/host_vars/gtr/secret.runtime.yml
        sops --decrypt .vault/repo/ansible/mihomo/group_vars/all/secret.sops.yml > mihomo/ansible/group_vars/all/secret.runtime.yml
        sops --decrypt .vault/repo/ansible/mihomo/group_vars/aliyun/secret.sops.yml > mihomo/ansible/group_vars/aliyun/secret.runtime.yml

        # Sealed Secrets private key — restored from vault so the controller
        # can reuse it on fresh clusters instead of generating a new keypair.
        if [ -f .vault/repo/infra/sealed-secrets/key-backup.enc.yaml ]; then
          sops --decrypt .vault/repo/infra/sealed-secrets/key-backup.enc.yaml \
            > .vault/repo/infra/sealed-secrets/key-backup.runtime.yaml
        fi

        sops --decrypt .vault/repo/grafana/secret.sops.yml > grafana/secret.runtime.yml
        chmod 600 \
          edge/ansible/group_vars/all/secret.runtime.yml \
          edge/ansible/host_vars/gtr/secret.runtime.yml \
          mihomo/ansible/group_vars/all/secret.runtime.yml \
          mihomo/ansible/group_vars/aliyun/secret.runtime.yml \
          grafana/secret.runtime.yml

        BOOTSTRAP_FILE="$bootstrap_file" GITHUB_OUTPUT="$GITHUB_OUTPUT" python3 - <<'PY'
        import os
        from pathlib import Path
        import yaml

        bootstrap = yaml.safe_load(Path(os.environ["BOOTSTRAP_FILE"]).read_text(encoding="utf-8"))
        ssh_dir = Path.home() / ".ssh"
        ssh_dir.mkdir(parents=True, exist_ok=True)
        (ssh_dir / "deploy_key").write_text(bootstrap["deploy_ssh_key"], encoding="utf-8")
        (ssh_dir / "deploy_key").chmod(0o600)
        (ssh_dir / "config").write_text(
            "Host *\n"
            "  IdentityFile ~/.ssh/deploy_key\n"
            "  StrictHostKeyChecking no\n"
            "  UserKnownHostsFile /dev/null\n",
            encoding="utf-8",
        )
        (ssh_dir / "config").chmod(0o600)

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"ts_oauth_client_id={bootstrap['ts_oauth_client_id']}\n")
            fh.write(f"ts_oauth_secret={bootstrap['ts_oauth_secret']}\n")
        PY
