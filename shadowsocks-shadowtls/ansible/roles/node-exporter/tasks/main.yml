---
# Node Exporter deployment tasks for remote server monitoring
# Optimized: merged user + dir + service + systemd + wait_for
# Preserved: unarchive for download with retry support

- name: Setup node_exporter user and binary directory
  ansible.builtin.shell: |
    set -e
    id -u node_exporter &>/dev/null || useradd -r -s /usr/sbin/nologin node_exporter
    mkdir -p {{ node_exporter_bin_path }}
    chown node_exporter:node_exporter {{ node_exporter_bin_path }} 2>/dev/null || true

- name: Deploy node_exporter systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      Documentation=https://github.com/prometheus/node_exporter
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=node_exporter
      Group=node_exporter
      ExecStart={{ node_exporter_bin_path }}/node_exporter \
          --web.listen-address=127.0.0.1:{{ node_exporter_port }} \
          --path.procfs=/proc \
          --path.sysfs=/sys \
          --path.rootfs=/ \
          --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
      Restart=always
      RestartSec=5
      StandardOutput=journal
      StandardError=journal
      NoNewPrivileges=true
      ProtectSystem=strict
      ProtectHome=true
      ReadWritePaths=/proc /sys

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: restart node_exporter

- name: Check if node_exporter binary exists
  ansible.builtin.stat:
    path: "{{ node_exporter_bin_path }}/node_exporter"
  register: node_exporter_binary

- name: Download and extract Node Exporter
  ansible.builtin.unarchive:
    src: "{{ node_exporter_download_url }}/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "{{ node_exporter_bin_path }}"
    remote_src: true
    extra_opts:
      - "--strip-components=1"
      - "--wildcards"
      - "*/node_exporter"
  environment: "{{ {'http_proxy': github_download_proxy, 'https_proxy': github_download_proxy} if (github_download_proxy | default('') | length > 0) else {} }}"
  register: node_exporter_download_result
  retries: 5
  delay: 10
  until: node_exporter_download_result is succeeded
  when: not node_exporter_binary.stat.exists
  notify: restart node_exporter

- name: Ensure node_exporter binary ownership
  ansible.builtin.file:
    path: "{{ node_exporter_bin_path }}/node_exporter"
    owner: node_exporter
    group: node_exporter
    mode: "0755"
  when: node_exporter_binary.stat.exists or (node_exporter_download_result is defined and node_exporter_download_result.changed)

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start Node Exporter service
  ansible.builtin.shell: |
    set -e
    systemctl daemon-reload
    systemctl enable --now node_exporter 2>/dev/null || systemctl start node_exporter
  changed_when: false

- name: Wait for Node Exporter to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ node_exporter_port }}"
    timeout: 30
