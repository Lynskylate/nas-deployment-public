---
- name: Verify Sealed Secrets on K3s (Argo CD managed)
  hosts: edge_tencent
  become: true
  gather_facts: false

  tasks:
    - name: Detect Sealed Secrets controller deployment name
      ansible.builtin.shell: |
        k3s kubectl -n kube-system get deployment \
          -l app.kubernetes.io/name=sealed-secrets \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || \
        k3s kubectl -n kube-system get deployment sealed-secrets-controller \
          -o jsonpath='{.metadata.name}' 2>/dev/null || echo ""
      register: ss_deploy_name
      changed_when: false
      failed_when: false

    - name: Fail if controller deployment not found
      ansible.builtin.fail:
        msg: >-
          Sealed Secrets controller deployment not found in kube-system.
          Ensure Argo CD Application 'sealed-secrets' has synced.
      when: ss_deploy_name.stdout | trim | length == 0

    - name: Check controller deployment rollout
      ansible.builtin.shell: |
        k3s kubectl -n kube-system rollout status deployment/{{ ss_deploy_name.stdout | trim }} --timeout=30s
      register: ss_rollout
      changed_when: false
      failed_when: ss_rollout.rc != 0

    - name: Check controller pods
      ansible.builtin.shell: |
        k3s kubectl -n kube-system get pods \
          -l app.kubernetes.io/name=sealed-secrets -o wide 2>/dev/null || \
        k3s kubectl -n kube-system get pods \
          -l name=sealed-secrets-controller -o wide
      register: ss_pods
      changed_when: false
      failed_when: false

    - name: Create and verify test SealedSecret
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubeseal \
            --controller-name={{ ss_deploy_name.stdout | trim }} \
            --controller-namespace=kube-system \
            --fetch-cert > /tmp/sealed-secrets-verify-cert.pem
          echo -n "hello-world" | k3s kubectl create secret generic test-secret \
            --dry-run=client -o json --from-file=/dev/stdin -n default \
            | kubeseal --cert=/tmp/sealed-secrets-verify-cert.pem \
              --format=yaml > /tmp/test-sealed-verify.yaml
          k3s kubectl apply -f /tmp/test-sealed-verify.yaml
          sleep 3
          k3s kubectl get secret test-secret -n default \
            -o jsonpath='{.data.stdin}' | base64 -d
        executable: /bin/bash
      register: ss_test
      changed_when: false
      failed_when: ss_test.stdout | trim != 'hello-world'

    - name: Show verification summary
      ansible.builtin.debug:
        msg:
          - "=== Sealed Secrets Verification (Argo CD managed) ==="
          - "Controller: {{ ss_deploy_name.stdout | trim }}"
          - "Rollout: {{ ss_rollout.stdout | default('check failed') }}"
          - "Pods:"
          - "{{ ss_pods.stdout | default('NOT FOUND') }}"
          - "Test secret decryption: {{ ss_test.stdout | trim | default('FAILED') }}"
          - ""
          - "Managed by Argo CD Application: sealed-secrets (Helm chart 2.x)"
          - "Private key source: vault (nas-deployment-vault/infra/sealed-secrets/)"
