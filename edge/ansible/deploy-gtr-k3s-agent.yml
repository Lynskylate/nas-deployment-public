---
- name: Deploy K3s agents on GTR, aliyun, remote_proxy
  hosts: gtr_core:edge_aliyun:edge_remote_proxy
  become: true

  roles:
    - role: edge-tailscale
    - role: k3s-prereq
    - role: k3s-agent
    - role: tailscale-p2p-heal

- name: Apply K3s node labels
  hosts: gtr_core:edge_aliyun:edge_remote_proxy
  become: true

  tasks:
    - name: Apply node labels (via server kubeconfig)
      delegate_to: "{{ groups['edge_tencent'][0] }}"
      ansible.builtin.command: >-
        k3s kubectl label node {{ k3s_node_name | default(inventory_hostname) }}
        {{ item.key }}={{ item.value }} --overwrite
      loop: "{{ k3s_node_labels | default({}) | dict2items }}"
      changed_when: false
      failed_when: false

    - name: Apply node taints (via server kubeconfig)
      delegate_to: "{{ groups['edge_tencent'][0] }}"
      ansible.builtin.command: >-
        k3s kubectl taint node {{ k3s_node_name | default(inventory_hostname) }}
        {{ item }} --overwrite
      loop: "{{ k3s_node_taints | default([]) }}"
      changed_when: false
      failed_when: false
