---
- name: Install K3s prerequisite packages
  ansible.builtin.apt:
    name: "{{ k3s_prereq_packages }}"
    state: present
    update_cache: "{{ not (k3s_prereq_skip_apt_update | default(false) | bool) }}"

- name: Persist required kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for item in k3s_prereq_modules %}
      {{ item }}
      {% endfor %}

- name: Load required kernel modules
  ansible.builtin.command: "modprobe {{ item }}"
  loop: "{{ k3s_prereq_modules }}"
  changed_when: false

- name: Deploy K3s sysctl baseline
  ansible.builtin.template:
    src: k3s-sysctl.conf.j2
    dest: /etc/sysctl.d/90-k3s.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload k3s sysctl

- name: Check current Tailscale netfilter mode
  ansible.builtin.shell: |
    set -o pipefail
    tailscale debug prefs 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('NetfilterMode',0))"
  args:
    executable: /bin/bash
  register: k3s_prereq_tailscale_netfilter
  changed_when: false
  failed_when: false
  when:
    - k3s_prereq_tailscale_nodivert | default(false) | bool

- name: Set tailscale --netfilter-mode=nodivert
  ansible.builtin.shell: |
    tailscale set --netfilter-mode=nodivert --accept-routes
  args:
    executable: /bin/bash
  register: k3s_prereq_tailscale_status
  changed_when: k3s_prereq_tailscale_status.rc == 0
  when:
    - k3s_prereq_tailscale_nodivert | default(false) | bool
    - k3s_prereq_tailscale_netfilter.stdout | trim | int != 1
  # 1 = nodivert, 2 = on (default)
  # Skip if already set to nodivert
