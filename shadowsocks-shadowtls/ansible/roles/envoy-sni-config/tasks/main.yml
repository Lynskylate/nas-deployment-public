---
# Envoy SNI Passthrough Configuration Role

- name: Check current Envoy LDS configuration
  ansible.builtin.stat:
    path: /etc/envoy/dynamic_config/lds.yaml
  register: lds_config

- name: Backup current Envoy configuration
  ansible.builtin.copy:
    src: /etc/envoy/
    dest: "/etc/envoy.backup-{{ ansible_date_time.epoch }}"
    mode: preserve
    remote_src: true
  when: lds_config.stat.exists

- name: Read current LDS configuration
  ansible.builtin.slurp:
    src: /etc/envoy/dynamic_config/lds.yaml
  register: current_lds
  when: lds_config.stat.exists

- name: Update LDS configuration with 443 listener
  ansible.builtin.blockinfile:
    path: /etc/envoy/dynamic_config/lds.yaml
    insertafter: 'resources:'
    marker: "    # {mark} ANSIBLE MANAGED - Shadow-TLS 443 Listener"
    block: |2
      - "@type": type.googleapis.com/envoy.config.listener.v3.Listener
        name: listener_443
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 443
        listener_filters:
          - name: envoy.filters.listener.tls_inspector
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
        filter_chains:
          - filter_chain_match:
              server_names: ["{{ shadowtls_sni_server }}", "*.microsoft.com"]
            filters:
              - name: envoy.filters.network.tcp_proxy
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                  stat_prefix: shadow_tls_passthrough
                  cluster: shadow_tls_client
  notify: restart envoy
  when: lds_config.stat.exists

- name: Read current CDS configuration
  ansible.builtin.slurp:
    src: /etc/envoy/dynamic_config/cds.yaml
  register: current_cds
  when: lds_config.stat.exists

- name: Update CDS configuration with shadow_tls_client cluster
  ansible.builtin.blockinfile:
    path: /etc/envoy/dynamic_config/cds.yaml
    insertafter: 'resources:'
    marker: "    # {mark} ANSIBLE MANAGED - Shadow-TLS Client Cluster"
    block: |2
      - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
        name: shadow_tls_client
        connect_timeout: 5s
        type: STATIC
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: shadow_tls_client
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      socket_address:
                        address: 127.0.0.1
                        port_value: {{ shadowtls_client_listen_port }}
        upstream_connection_options:
          tcp_keepalive: {}
  notify: restart envoy
  when: lds_config.stat.exists

- name: Update Envoy systemd service dependencies
  ansible.builtin.lineinfile:
    path: /etc/systemd/system/envoy.service
    regexp: '^After='
    line: After=network.target shadow-tls-client.service shadowsocks-client.service
    state: present
  notify: reload systemd
  when: lds_config.stat.exists

- name: Add Requires directive to Envoy service
  ansible.builtin.lineinfile:
    path: /etc/systemd/system/envoy.service
    regexp: '^Requires='
    line: "Requires=shadow-tls-client.service"
    state: present
    insertafter: '^After='
  notify:
    - reload systemd
    - restart envoy
  when: lds_config.stat.exists
