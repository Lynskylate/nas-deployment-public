apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-pv
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/Lynskylate/nas-deployment-public.git
    path: platform/resources/observability-pv
    targetRevision: feat/observability-k8s-migration
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false  # PV/PVC should never be auto-pruned
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
