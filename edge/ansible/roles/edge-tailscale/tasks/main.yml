---
- name: Check tailscale binary
  ansible.builtin.command: which tailscale
  register: edge_tailscale_binary
  changed_when: false
  failed_when: false

- name: Install tailscale when missing
  ansible.builtin.package:
    name: tailscale
    state: present
  when: edge_tailscale_binary.rc != 0

- name: Ensure tailscaled service is enabled and running
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Verify tailscale command is available
  ansible.builtin.command: tailscale version
  register: edge_tailscale_version
  changed_when: false
