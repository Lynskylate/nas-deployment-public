---
- name: Assert K3s server token is provided
  ansible.builtin.assert:
    that:
      - k3s_cluster_token is defined
      - k3s_cluster_token | length > 0
    fail_msg: "k3s_cluster_token must be provided before deploying the K3s server"
  no_log: true

- name: Read server Tailscale IPv4 address
  ansible.builtin.command: tailscale ip -4
  register: k3s_server_tailscale_ip_cmd
  changed_when: false

- name: Derive effective K3s server endpoint IP
  ansible.builtin.set_fact:
    k3s_server_effective_ip: "{{ k3s_server_tailscale_ip | default(k3s_server_tailscale_ip_cmd.stdout_lines[0], true) }}"
    k3s_server_effective_tls_sans: "{{ ((k3s_server_tls_sans | default([])) + [inventory_hostname, ansible_host, (k3s_server_tailscale_ip | default(k3s_server_tailscale_ip_cmd.stdout_lines[0], true))]) | unique }}"

- name: Ensure K3s server config directory exists
  ansible.builtin.file:
    path: "{{ k3s_server_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render K3s server config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ k3s_server_config_path }}"
    owner: root
    group: root
    mode: "0600"
  notify: restart k3s server

- name: Render containerd registry mirrors
  ansible.builtin.template:
    src: registries.yaml.j2
    dest: "/etc/rancher/k3s/registries.yaml"
    owner: root
    group: root
    mode: "0644"
  when: k3s_registry_mirrors is defined and (k3s_registry_mirrors | length > 0)
  notify: restart k3s server

- name: Set K3s installer script URL
  ansible.builtin.set_fact:
    k3s_effective_install_script_url: >-
      {{ (k3s_mirror == 'cn') | ternary('https://rancher-mirror.rancher.cn/k3s/k3s-install.sh', k3s_install_script_url) }}

- name: Download K3s installer
  ansible.builtin.get_url:
    url: "{{ k3s_effective_install_script_url }}"
    dest: "{{ k3s_install_script_path }}"
    owner: root
    group: root
    mode: "0755"
  environment: "{{ {'http_proxy': github_download_proxy, 'https_proxy': github_download_proxy} if (github_download_proxy | default('') | length > 0) else {} }}"

- name: Check if K3s binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_server_binary

- name: Check if K3s server service exists
  ansible.builtin.stat:
    path: "{{ k3s_server_service_path }}"
  register: k3s_server_service

- name: Check K3s server runtime health
  ansible.builtin.shell: |
    if ! systemctl is-active --quiet {{ k3s_server_service_name }}; then
      echo "not_running"
    elif ! {{ k3s_server_service_name }} kubectl get nodes --no-headers &>/dev/null; then
      echo "degraded"
    else
      echo "healthy"
    fi
  register: k3s_server_health
  changed_when: false
  failed_when: false

- name: Determine if K3s server installation is needed
  ansible.builtin.set_fact:
    k3s_server_needs_install: >-
      {{ not k3s_server_binary.stat.exists
         or not k3s_server_service.stat.exists
         or k3s_server_health.stdout != 'healthy' }}

- name: Build K3s server install environment
  ansible.builtin.set_fact:
    k3s_server_install_env: >-
      {{ {'INSTALL_K3S_CHANNEL': k3s_channel,
          'INSTALL_K3S_MIRROR': k3s_mirror,
          'INSTALL_K3S_EXEC': 'server'}
        | combine((k3s_mirror != 'cn') | ternary({'http_proxy': github_download_proxy, 'https_proxy': github_download_proxy}, {}))
        | dict2items | rejectattr('value', 'equalto', '') | items2dict }}

- name: Install K3s server
  ansible.builtin.shell: |
    set -euo pipefail
    sh "{{ k3s_install_script_path }}"
  args:
    executable: /bin/bash
  environment: "{{ k3s_server_install_env }}"
  when: k3s_server_needs_install | bool

- name: Configure containerd HTTP proxy for image pulling
  ansible.builtin.blockinfile:
    path: "/etc/systemd/system/{{ k3s_server_service_name }}.service.env"
    block: |
      HTTP_PROXY={{ k3s_containerd_http_proxy }}
      HTTPS_PROXY={{ k3s_containerd_https_proxy }}
      NO_PROXY={{ k3s_containerd_no_proxy }}
    marker: "# {mark} ANSIBLE MANAGED: containerd proxy"
    create: true
    mode: "0600"
  when: k3s_containerd_http_proxy | default('') | length > 0
  notify: restart k3s server

- name: Flush K3s server handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure K3s server is enabled and started
  ansible.builtin.systemd:
    name: "{{ k3s_server_service_name }}"
    daemon_reload: true
    enabled: true
    state: started

- name: Wait for K3s API server port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 90

- name: Wait for K3s service to stabilize
  ansible.builtin.shell: systemctl is-active --quiet {{ k3s_server_service_name }}
  register: k3s_service_check
  retries: 12
  delay: 5
  until: k3s_service_check.rc == 0
  changed_when: false

- name: Read K3s server nodes
  ansible.builtin.command: k3s kubectl get nodes --no-headers
  register: k3s_server_nodes
  changed_when: false
  retries: 5
  delay: 10
  until: k3s_server_nodes.rc == 0

- name: Show K3s server deployment summary
  ansible.builtin.debug:
    msg:
      - "k3s_server_ip={{ k3s_server_effective_ip }}"
      - "cluster_cidr={{ k3s_cluster_cidr }}"
      - "service_cidr={{ k3s_service_cidr }}"
      - "health={{ k3s_server_health.stdout | default('unknown') }}"
      - "needs_install={{ k3s_server_needs_install | default(true) }}"
      - "nodes={{ k3s_server_nodes.stdout_lines }}"
