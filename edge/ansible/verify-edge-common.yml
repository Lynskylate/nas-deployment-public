---
# Verify edge baseline — Optimized: merged multiple systemd/uri/shell calls
- name: Verify edge baseline
  hosts: edge_hosts
  become: true

  tasks:
    - name: Verify required services are active
      ansible.builtin.shell: |
        set -e
        for svc in tailscaled envoy; do
          systemctl is-active "$svc" >/dev/null || { echo "FAIL: $svc is not active"; exit 1; }
        done
        {% if edge_vector_enabled | bool %}
        systemctl is-active vector >/dev/null || { echo "FAIL: vector is not active"; exit 1; }
        {% endif %}
      changed_when: false

    - name: Read current tailscale accept-dns setting
      ansible.builtin.shell: |
        set -o pipefail
        tailscale debug prefs 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(str(d.get('CorpDNS', True)).lower())"
      args:
        executable: /bin/bash
      register: edge_tailscale_corp_dns
      changed_when: false
      failed_when: false

    - name: Read effective resolv.conf target when tailscale DNS is disabled
      ansible.builtin.command: readlink -f /etc/resolv.conf
      register: edge_tailscale_resolv_conf_target
      changed_when: false
      when: not (edge_tailscale_accept_dns | default(true) | bool)

    - name: Assert tailscale DNS contract
      ansible.builtin.assert:
        that:
          - (edge_tailscale_corp_dns.stdout | trim | lower) == ((edge_tailscale_accept_dns | default(true) | bool) | ternary('true', 'false'))
          - (edge_tailscale_accept_dns | default(true) | bool) or (edge_tailscale_resolv_conf_target.stdout | trim == '/run/systemd/resolve/stub-resolv.conf')
        fail_msg: >-
          Tailscale DNS 契约不满足：
          accept_dns_expected={{ (edge_tailscale_accept_dns | default(true) | bool) | ternary('true', 'false') }}
          accept_dns_actual={{ edge_tailscale_corp_dns.stdout | trim | lower }}
          resolv_conf_target={{ edge_tailscale_resolv_conf_target.stdout | default('not-checked') | trim }}

    - name: Check edge ports and forbidden proxy ports
      ansible.builtin.shell: |
        set -e
        # Check configured edge ports
        for port in {{ envoy_listener_port }}{% if envoy_http_listener_enabled | bool %} {{ envoy_http_listener_port }}{% endif %}; do
          ss -tulnp | grep -q ":$port " || { echo "FAIL: port $port not listening"; exit 1; }
        done
        # Assert forbidden proxy ports are NOT listening
        for fport in {{ edge_forbidden_proxy_ports | join(' ') }}; do
          if ss -tulnp | grep -qE ":$fport\b"; then
            echo "FAIL: forbidden proxy port $fport detected"
            exit 1
          fi
        done
      changed_when: false

    - name: Verify Envoy admin endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ envoy_admin_port }}/stats"
        return_content: false

    - name: Assert envoy admin path is not exposed on public listeners
      ansible.builtin.shell: |
        set -e
        # Check TLS listener
        code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://127.0.0.1:{{ envoy_listener_port }}/envoy_admin")
        if [ "$code" = "000" ]; then
          echo "FAIL: cannot reach Envoy TLS listener on port {{ envoy_listener_port }}"
          exit 1
        fi
        [ "$code" = "404" ] || { echo "FAIL: admin exposed on TLS (HTTP $code)"; exit 1; }
        {% if envoy_http_listener_enabled | bool %}
        code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://127.0.0.1:{{ envoy_http_listener_port }}/envoy_admin")
        if [ "$code" = "000" ]; then
          echo "FAIL: cannot reach Envoy HTTP listener on port {{ envoy_http_listener_port }}"
          exit 1
        fi
        [ "$code" = "404" ] || { echo "FAIL: admin exposed on HTTP (HTTP $code)"; exit 1; }
        {% endif %}
      changed_when: false

    - name: Check tunnel server services on enabled hosts
      ansible.builtin.shell: |
        set -e
        for svc in shadowsocks-server shadow-tls-server; do
          systemctl is-active "$svc" >/dev/null || { echo "FAIL: $svc not active"; exit 1; }
        done
        # Check tunnel ports
        ss -tulnp | grep -q '127.0.0.1:{{ shadowsocks_server_port }}' || { echo "FAIL: SS port not listening"; exit 1; }
        ss -tulnp | grep -q '127.0.0.1:{{ shadowtls_server_listen_port }}' || { echo "FAIL: Shadow-TLS port not listening"; exit 1; }
      changed_when: false
      when: edge_tunnel_server_enabled | bool

    - name: Assert tunnel server ports are closed on disabled hosts
      ansible.builtin.shell: |
        if ss -tulnp | grep -Eq '127.0.0.1:({{ shadowsocks_server_port }}|{{ shadowtls_server_listen_port }})\b'; then
          echo "FAIL: tunnel server ports should not be open"
          exit 1
        fi
      changed_when: false
      when: not (edge_tunnel_server_enabled | bool)

    - name: Probe Tailscale direct path to configured peer
      ansible.builtin.command: "tailscale ping -c 5 {{ tailscale_p2p_peer_ip }}"
      register: tailscale_p2p_probe
      changed_when: false
      failed_when: false
      retries: 3
      delay: 5
      until:
        - tailscale_p2p_probe.rc == 0
        - "'via DERP(' not in tailscale_p2p_probe.stdout"
      when: tailscale_p2p_heal_enabled | default(false) | bool

    - name: Assert Tailscale direct path to configured peer
      ansible.builtin.assert:
        that:
          - tailscale_p2p_probe.rc == 0
          - "'via DERP(' not in tailscale_p2p_probe.stdout"
        fail_msg: >-
          Tailscale direct path check failed for {{ tailscale_p2p_peer_name }}:
          stdout={{ tailscale_p2p_probe.stdout | default('') | trim }}
          stderr={{ tailscale_p2p_probe.stderr | default('') | trim }}
      when: tailscale_p2p_heal_enabled | default(false) | bool
