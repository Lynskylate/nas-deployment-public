---
# === K3s Server (control-plane) — migrated from aliyun ===

edge_tunnel_server_enabled: false

# Tencent edge node ships edge logs to GTR VictoriaLogs through Tailscale.
edge_vector_sink_type: "victorialogs"

# Server role configuration
k3s_server_tailscale_ip: 100.99.48.76
k3s_server_tls_sans:
  - tencent
  - 100.99.48.76
  - 129.211.12.63

# P2P heal to GTR
tailscale_p2p_heal_enabled: true
tailscale_p2p_peer_name: gtr
tailscale_p2p_peer_ip: "{{ gtr_tailscale_ip }}"

# Tencent Cloud 国内节点，镜像拉取走 GTR mihomo 代理
github_download_proxy: "http://{{ gtr_tailscale_ip }}:7890"
k3s_containerd_http_proxy: "http://{{ gtr_tailscale_ip }}:7890"
k3s_containerd_https_proxy: "http://{{ gtr_tailscale_ip }}:7890"
k3s_prereq_tailscale_nodivert: true

k3s_node_labels:
  gtr.io/region: cn
  gtr.io/visibility: public
  node-role.kubernetes.io/control-plane: "true"
