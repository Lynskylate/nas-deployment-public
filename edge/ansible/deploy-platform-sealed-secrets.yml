---
- name: Deploy Sealed Secrets on aliyun K3s
  hosts: edge_aliyun
  become: true

  vars:
    sealed_secrets_version: v0.27.2
    sealed_secrets_manifest_url: "https://github.com/bitnami-labs/sealed-secrets/releases/download/{{ sealed_secrets_version }}/controller.yaml"
    kubeseal_download_url: "https://github.com/bitnami-labs/sealed-secrets/releases/download/{{ sealed_secrets_version }}/kubeseal-{{ sealed_secrets_version | regex_replace('^v', '') }}-linux-amd64.tar.gz"
    kubeseal_bin_path: /usr/local/bin/kubeseal

  tasks:
    - name: Ensure kube-system namespace exists
      ansible.builtin.shell: |
        k3s kubectl create namespace kube-system --dry-run=client -o yaml \
          | k3s kubectl apply -f -
      changed_when: false

    - name: Check existing Sealed Secrets controller image
      ansible.builtin.shell: |
        k3s kubectl -n kube-system get deployment/sealed-secrets-controller \
          -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true
      register: sealed_secrets_controller_image
      changed_when: false
      failed_when: false

    - name: Check existing Sealed Secrets rollout
      ansible.builtin.shell: |
        k3s kubectl -n kube-system rollout status deployment/sealed-secrets-controller --timeout=15s
      register: sealed_secrets_existing_rollout
      changed_when: false
      failed_when: false

    - name: Check existing kubeseal binary
      ansible.builtin.stat:
        path: "{{ kubeseal_bin_path }}"
      register: kubeseal_binary

    - name: Check existing test secret value
      ansible.builtin.shell: |
        k3s kubectl get secret test-secret -o jsonpath='{.data.stdin}' 2>/dev/null | base64 -d
      register: sealed_secrets_test_secret
      changed_when: false
      failed_when: false

    - name: Determine whether Sealed Secrets reapply is needed
      ansible.builtin.set_fact:
        sealed_secrets_needs_redeploy: >-
          {{ (sealed_secrets_version not in (sealed_secrets_controller_image.stdout | default('')))
             or sealed_secrets_existing_rollout.rc != 0 }}
        sealed_secrets_needs_test_secret: >-
          {{ sealed_secrets_needs_redeploy
             or sealed_secrets_test_secret.stdout | trim != 'hello-world' }}

    - name: Download and install kubeseal
      when:
        - sealed_secrets_version | length > 0
        - not kubeseal_binary.stat.exists
      block:
        - name: Download kubeseal archive
          ansible.builtin.get_url:
            url: "{{ kubeseal_download_url }}"
            dest: /tmp/kubeseal.tar.gz
            owner: root
            group: root
            mode: "0644"
          environment:
            http_proxy: "{{ github_download_proxy | default('') }}"
            https_proxy: "{{ github_download_proxy | default('') }}"
          when: github_download_proxy | default('') | length > 0

        - name: Download kubeseal archive (no proxy fallback)
          ansible.builtin.get_url:
            url: "{{ kubeseal_download_url }}"
            dest: /tmp/kubeseal.tar.gz
            owner: root
            group: root
            mode: "0644"
          when: github_download_proxy | default('') | length == 0

        - name: Extract kubeseal binary
          ansible.builtin.unarchive:
            src: /tmp/kubeseal.tar.gz
            dest: /tmp/
            remote_src: true
            include:
              - kubeseal
          changed_when: false

        - name: Install kubeseal binary
          ansible.builtin.copy:
            src: /tmp/kubeseal
            dest: "{{ kubeseal_bin_path }}"
            owner: root
            group: root
            mode: "0755"
            remote_src: true
          changed_when: false

        - name: Clean up kubeseal archive
          ansible.builtin.file:
            path: /tmp/kubeseal.tar.gz
            state: absent

    - name: Download Sealed Secrets controller manifest
      ansible.builtin.get_url:
        url: "{{ sealed_secrets_manifest_url }}"
        dest: /tmp/sealed-secrets-controller.yaml
        owner: root
        group: root
        mode: "0644"
      environment:
        http_proxy: "{{ github_download_proxy | default('') }}"
        https_proxy: "{{ github_download_proxy | default('') }}"
      when:
        - sealed_secrets_needs_redeploy | bool
        - github_download_proxy | default('') | length > 0

    - name: Download Sealed Secrets controller manifest (no proxy)
      ansible.builtin.get_url:
        url: "{{ sealed_secrets_manifest_url }}"
        dest: /tmp/sealed-secrets-controller.yaml
        owner: root
        group: root
        mode: "0644"
      when:
        - sealed_secrets_needs_redeploy | bool
        - github_download_proxy | default('') | length == 0

    - name: Apply Sealed Secrets controller manifest
      ansible.builtin.shell: |
        k3s kubectl apply -f /tmp/sealed-secrets-controller.yaml
      changed_when: false
      when: sealed_secrets_needs_redeploy | bool

    - name: Wait for Sealed Secrets controller rollout
      ansible.builtin.shell: |
        k3s kubectl -n kube-system rollout status deployment/sealed-secrets-controller --timeout=120s
      changed_when: false
      register: sealed_secrets_rollout
      failed_when: sealed_secrets_rollout.rc != 0
      when: sealed_secrets_needs_redeploy | bool

    - name: Re-check Sealed Secrets rollout on fast path
      ansible.builtin.set_fact:
        sealed_secrets_rollout:
          stdout: "{{ sealed_secrets_existing_rollout.stdout | default('already ready') }}"
          rc: "{{ sealed_secrets_existing_rollout.rc }}"
      when: not (sealed_secrets_needs_redeploy | bool)

    - name: Export controller public cert via port-forward
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          # Kill any stale port-forwards
          pkill -f "port-forward.*1808." 2>/dev/null || true
          # Port-forward to sealed-secrets controller, fetch cert via HTTP
          k3s kubectl -n kube-system port-forward svc/sealed-secrets-controller \
            18083:8080 &>/dev/null &
          PF_PID=$!
          sleep 4
          curl -sf --max-time 5 http://127.0.0.1:18083/v1/cert.pem \
            > /tmp/sealed-secrets-public-key.pem
          RC=$?
          kill $PF_PID 2>/dev/null || true
          wait $PF_PID 2>/dev/null || true
          exit $RC
        executable: /bin/bash
      register: sealed_secrets_cert
      changed_when: false
      failed_when: false
      when: sealed_secrets_needs_test_secret | bool

    - name: Export controller private key backup
      ansible.builtin.shell: |
        k3s kubectl get secret -n kube-system \
          -l sealedsecrets.bitnami.com/sealed-secrets-key \
          -o yaml > /tmp/sealed-secrets-key-backup.yaml
      register: sealed_secrets_key_backup
      changed_when: false
      failed_when: false
      when: sealed_secrets_needs_redeploy | bool

    - name: Check key backup file was created
      ansible.builtin.stat:
        path: /tmp/sealed-secrets-key-backup.yaml
      register: key_backup_stat
      when: sealed_secrets_needs_redeploy | bool

    - name: Show key backup status
      ansible.builtin.debug:
        msg:
          - "Sealed Secrets key backup: {{ 'EXISTS' if key_backup_stat.stat.exists else 'MISSING' }}"
          - "Public cert exported: {{ sealed_secrets_cert.rc == 0 }}"
          - ""
          - "Key backup saved to: /tmp/sealed-secrets-key-backup.yaml"
          - "To encrypt for vault:"
          - "  sops --encrypt --age <AGE_KEY> /tmp/sealed-secrets-key-backup.yaml > nas-deployment-vault/infra/sealed-secrets/key-backup.enc.yaml"
      when: sealed_secrets_needs_redeploy | bool

    - name: Persist key backup for disaster recovery
      ansible.builtin.copy:
        src: /tmp/sealed-secrets-key-backup.yaml
        dest: /var/lib/rancher/k3s/sealed-secrets-key-backup.yaml
        remote_src: true
        owner: root
        group: root
        mode: "0600"
      changed_when: false
      when:
        - sealed_secrets_needs_redeploy | bool
        - key_backup_stat.stat.exists

    - name: Clean up temp key backup
      ansible.builtin.file:
        path: /tmp/sealed-secrets-key-backup.yaml
        state: absent
      changed_when: false
      when: sealed_secrets_needs_redeploy | bool

    - name: Create test SealedSecret
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          # Use local cert to seal a test secret (offline mode, no API proxy needed)
          echo -n "hello-world" | k3s kubectl create secret generic test-secret \
            --dry-run=client -o json --from-file=/dev/stdin -n default \
            | /usr/local/bin/kubeseal --cert=/tmp/sealed-secrets-public-key.pem \
              --format=yaml \
              > /tmp/test-sealed.yaml && \
          k3s kubectl apply -f /tmp/test-sealed.yaml && \
          echo "TEST_SEALED_SECRET_APPLIED=true"
        executable: /bin/bash
      register: test_sealed_secret
      changed_when: false
      failed_when: false
      when: sealed_secrets_needs_test_secret | bool

    - name: Show test result
      ansible.builtin.debug:
        msg:
          - "sealed_secrets_needs_redeploy={{ sealed_secrets_needs_redeploy }}"
          - "sealed_secrets_needs_test_secret={{ sealed_secrets_needs_test_secret }}"
          - "Test SealedSecret applied: {{ 'SKIPPED' if not (sealed_secrets_needs_test_secret | bool) else ('SUCCESS' if 'TEST_SEALED_SECRET_APPLIED=true' in (test_sealed_secret.stdout | default('')) else 'FAILED') }}"
          - "{{ test_sealed_secret.stdout_lines | default([]) }}"
