---
- name: Verify Argo CD on tencent K3s
  hosts: edge_tencent
  become: true
  gather_facts: false
  vars:
    argocd_expected_repo_url: https://github.com/Lynskylate/nas-deployment-public.git
    argocd_expected_repo_path: platform/applications

  tasks:
    - name: Check Argo CD pods
      ansible.builtin.shell: |
        k3s kubectl -n argocd get pods -o wide
      register: argocd_pods
      changed_when: false

    - name: Check Argo CD deployments
      ansible.builtin.shell: |
        k3s kubectl -n argocd get deployments
      register: argocd_deployments
      changed_when: false

    - name: Check Argo CD services
      ansible.builtin.shell: |
        k3s kubectl -n argocd get svc
      register: argocd_services
      changed_when: false

    - name: Read platform-apps source
      ansible.builtin.shell: |
        k3s kubectl -n argocd get application platform-apps \
          -o jsonpath='{.spec.source.repoURL}{"\n"}{.spec.source.targetRevision}{"\n"}{.spec.source.path}'
      register: argocd_platform_apps_source
      changed_when: false
      failed_when: argocd_platform_apps_source.rc != 0

    - name: Parse platform-apps source
      ansible.builtin.set_fact:
        argocd_platform_apps_repo_url: "{{ (argocd_platform_apps_source.stdout_lines | default([]))[0] | default('') }}"
        argocd_platform_apps_target_revision: "{{ (argocd_platform_apps_source.stdout_lines | default([]))[1] | default('') }}"
        argocd_platform_apps_path: "{{ (argocd_platform_apps_source.stdout_lines | default([]))[2] | default('') }}"

    - name: Assert platform-apps points to the formal GitHub repo
      ansible.builtin.assert:
        that:
          - argocd_platform_apps_repo_url == argocd_expected_repo_url
          - argocd_platform_apps_target_revision in ['HEAD', 'main']
          - argocd_platform_apps_path == argocd_expected_repo_path
        fail_msg: >-
          platform-apps source mismatch:
          repoURL={{ argocd_platform_apps_repo_url }},
          targetRevision={{ argocd_platform_apps_target_revision }},
          path={{ argocd_platform_apps_path }}.
          Expected repoURL={{ argocd_expected_repo_url }},
          targetRevision in [HEAD, main],
          path={{ argocd_expected_repo_path }}.

    - name: Check argocd-server deployment status
      ansible.builtin.shell: |
        k3s kubectl -n argocd rollout status deployment/argocd-server --timeout=10s
      register: argocd_server_status
      changed_when: false
      failed_when: false

    - name: Check argocd-initial-admin-secret exists
      ansible.builtin.shell: |
        k3s kubectl -n argocd get secret argocd-initial-admin-secret -o name
      register: argocd_admin_secret
      changed_when: false
      failed_when: argocd_admin_secret.stdout == ""

    - name: Get admin password
      ansible.builtin.shell: |
        k3s kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath='{.data.password}' | base64 -d
      register: argocd_admin_password
      changed_when: false
      failed_when: argocd_admin_password.stdout | length == 0

    - name: Show Argo CD summary
      ansible.builtin.debug:
        msg:
          - "=== Argo CD Verification ==="
          - "Pods:"
          - "{{ argocd_pods.stdout }}"
          - ""
          - "Deployments:"
          - "{{ argocd_deployments.stdout }}"
          - ""
          - "Services:"
          - "{{ argocd_services.stdout }}"
          - ""
          - "platform-apps source:"
          - "  repoURL={{ argocd_platform_apps_repo_url }}"
          - "  targetRevision={{ argocd_platform_apps_target_revision }}"
          - "  path={{ argocd_platform_apps_path }}"
          - ""
          - "argocd-server rollout: {{ argocd_server_status.stdout | default('check failed') }}"
          - "admin secret exists: {{ argocd_admin_secret.stdout != '' }}"
          - "admin password retrieved: {{ argocd_admin_password.stdout | length > 0 }}"
          - ""
          - "To access Argo CD UI:"
          - "  k3s kubectl port-forward -n argocd svc/argocd-server 8080:80"
          - "  Open http://127.0.0.1:8080"
          - "  Username: admin"
          - "  Password retrieved ({{ argocd_admin_password.stdout | length }} chars)"
