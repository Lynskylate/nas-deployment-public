# GTR 作为统一的 Tailscale 出口代理与可观测性汇聚点；基础设施路径统一走 IP，不依赖 MagicDNS。
gtr_tailscale_ip: 100.121.0.67
github_download_proxy: "http://{{ gtr_tailscale_ip }}:7890"
shadowsocks_version: v1.18.2
shadowtls_version: v0.2.25
shadowsocks_download_url: https://github.com/shadowsocks/shadowsocks-rust/releases/download
shadowtls_download_url: https://github.com/ihciah/shadow-tls/releases/download
shadowsocks_method: aes-256-gcm
shadowsocks_timeout: 300
shadowsocks_server_port: 8388
shadowtls_tls_port: 443
shadowtls_sni_server: www.microsoft.com
shadowtls_sni_port: 443
shadowtls_server_listen_port: 8443
ss_server_bin_path: /usr/local/shadowsocks-server
stls_server_bin_path: /usr/local/shadow-tls-server
edge_tunnel_server_enabled: false
node_exporter_port: 9100
envoy_version: v1.37.0
envoy_download_url: https://github.com/envoyproxy/envoy/releases/download
envoy_bin_path: /usr/local/envoy
edge_manage_envoy_binary_dir: true
envoy_admin_port: 9901
envoy_log_path: /var/log/envoy
envoy_log_max_size: 100M
envoy_log_rotate: 7
envoy_listener_port: 443
envoy_http_listener_enabled: true
envoy_http_listener_port: 80
envoy_dynamic_config_dir: /etc/envoy/dynamic_config
envoy_tls_cert_dir: /etc/envoy/certs
envoy_domain_routes:
- name: node_exporter_metrics
  mode: http_plaintext
  path_prefix: /metrics
  cluster: node_exporter
- name: envoy_admin_metrics
  mode: http_plaintext
  path_prefix: /stats/prometheus
  cluster: envoy_admin
envoy_additional_clusters: []
edge_vector_enabled: true
vector_version: 0.53.0
vector_download_url: https://github.com/vectordotdev/vector/releases/download
vector_bin_path: /usr/local/bin/vector
vector_archive_dirname: vector-x86_64-unknown-linux-gnu
vector_config_dir: /etc/vector
vector_data_dir: /var/lib/vector
vector_log_path: /var/log/vector
edge_vector_sink_type: local_file
victorialogs_host: "{{ gtr_tailscale_ip }}"
victorialogs_port: 8429
victoriametrics_host: "{{ gtr_tailscale_ip }}"
victoriametrics_port: 8428
victoriatraces_host: "{{ gtr_tailscale_ip }}"
victoriatraces_http_port: 9428
edge_vector_otlp_grpc_listen: 127.0.0.1:4317
edge_vector_otlp_http_listen: 127.0.0.1:4318
edge_forbidden_proxy_ports:
  - 1080
  - 7890
  - 8888
k3s_channel: stable
# k3s_mirror: "cn" → use Rancher CN mirror; "" → use upstream GitHub. See k3s/README.md.
k3s_mirror: "cn"
k3s_server_url: https://100.99.48.76:6443
k3s_cluster_cidr: 10.60.0.0/16
k3s_service_cidr: 10.61.0.0/16
k3s_cluster_dns: 10.61.0.10
k3s_flannel_backend: "vxlan"
k3s_flannel_iface: "tailscale0"
k3s_embedded_registry: true
k3s_p2p_port: 5101
k3s_disable_components:
- traefik
- servicelb

# Containerd image pull proxy (docker.io blocked in China).
# Each node overrides this in host_vars for its own proxy path.
k3s_containerd_http_proxy: "http://{{ gtr_tailscale_ip }}:7890"
k3s_containerd_https_proxy: "http://{{ gtr_tailscale_ip }}:7890"
k3s_containerd_no_proxy: "localhost,127.0.0.1,10.0.0.0/8,100.0.0.0/8"
