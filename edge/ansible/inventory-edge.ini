[edge_remote_proxy]
# CI 管理面直接走 remote_proxy 公网 SSH，避免 GitHub Actions runner
# 为了部署美国节点先接入 tailnet，再跨洋转一跳。
remote_proxy ansible_host=66.154.100.187 ansible_user=ci ansible_port=22

[edge_aliyun]
# 原 K3s server（已迁移至 tencent），现在作为 agent。
# SSH 目前不稳定（IO wait 高），恢复后可重新加入集群。
aliyun ansible_host=47.120.46.128 ansible_user=ci ansible_port=22

[edge_tencent]
# K3s server (control-plane) — 使用公网 IP 以保证 SSH 可靠（Tailscale TCP 在腾讯云 DPI 下不稳定）
tencent ansible_host=129.211.12.63 ansible_user=ci ansible_port=22

[edge_hosts:children]
edge_remote_proxy
edge_aliyun
edge_tencent

[gtr_core]
gtr ansible_host=gtr.tail414c32.ts.net ansible_user=ci ansible_port=22

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_become_timeout=30
