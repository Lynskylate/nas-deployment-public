---
# Node Exporter deployment tasks for remote server monitoring

- name: Create node_exporter user
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create node_exporter binary directory
  ansible.builtin.file:
    path: "{{ node_exporter_bin_path }}"
    state: directory
    owner: node_exporter
    group: node_exporter
    mode: '0755'

- name: Check if node_exporter binary exists
  ansible.builtin.stat:
    path: "{{ node_exporter_bin_path }}/node_exporter"
  register: node_exporter_binary

- name: Create temporary directory for download
  ansible.builtin.tempfile:
    state: directory
    suffix: _node_exporter
  register: temp_dir
  when: not node_exporter_binary.stat.exists

- name: Download and extract Node Exporter
  ansible.builtin.unarchive:
    src: "{{ node_exporter_download_url }}/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "{{ temp_dir.path }}"
    remote_src: true
    creates: "{{ temp_dir.path }}/node_exporter-{{ node_exporter_version }}.linux-amd64"
    timeout: 300
  environment: "{{ {'http_proxy': github_download_proxy, 'https_proxy': github_download_proxy} if (github_download_proxy | default('') | length > 0) else {} }}"
  register: node_exporter_download_result
  retries: 5
  delay: 10
  until: node_exporter_download_result is succeeded
  when: not node_exporter_binary.stat.exists

- name: Install Node Exporter binary
  ansible.builtin.copy:
    src: "{{ temp_dir.path }}/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: "{{ node_exporter_bin_path }}/node_exporter"
    owner: node_exporter
    group: node_exporter
    mode: '0755'
    remote_src: true
  when: not node_exporter_binary.stat.exists
  notify:
    - restart node_exporter

- name: Deploy Node Exporter systemd service file
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start Node Exporter service
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true

- name: Wait for Node Exporter to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ node_exporter_port }}"
    timeout: 30

- name: Clean up temporary directory
  ansible.builtin.file:
    path: "{{ temp_dir.path }}"
    state: absent
  when:
    - not node_exporter_binary.stat.exists
    - temp_dir.path is defined
