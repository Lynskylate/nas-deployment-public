---
- name: Check Envoy config directory
  ansible.builtin.stat:
    path: "{{ envoy_dynamic_config_dir }}"
  register: envoy_config_dir_stat

- name: Fail if Envoy config directory doesn't exist
  ansible.builtin.fail:
    msg: "Envoy dynamic config directory {{ envoy_dynamic_config_dir }} does not exist"
  when: not envoy_config_dir_stat.stat.exists

- name: Check if opentelemetry_collector cluster exists in CDS
  ansible.builtin.shell: grep -c "opentelemetry_collector" {{ envoy_dynamic_config_dir }}/cds.yaml || echo "0"
  register: otlp_cluster_check
  changed_when: false
  failed_when: false

- name: Read current CDS content
  ansible.builtin.slurp:
    src: "{{ envoy_dynamic_config_dir }}/cds.yaml"
  register: cds_content

- name: Update CDS with opentelemetry_collector cluster
  ansible.builtin.copy:
    content: "{{ updated_cds }}"
    dest: "{{ envoy_dynamic_config_dir }}/cds.yaml"
    owner: envoy
    group: envoy
    mode: '0644'
  vars:
    updated_cds: |
      # filepath: {{ envoy_dynamic_config_dir }}/cds.yaml
      version_info: "0"
      resources:
          # BEGIN ANSIBLE MANAGED - Shadow-TLS Client Cluster
        - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
          name: shadow_tls_client
          connect_timeout: 5s
          type: STATIC
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: shadow_tls_client
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 8443
          upstream_connection_options:
            tcp_keepalive: {}
          # END ANSIBLE MANAGED - Shadow-TLS Client Cluster
        - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
          name: admin_service
          connect_timeout: 0.25s
          type: STATIC
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: admin_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 9901
        - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
          name: grafana_service
          connect_timeout: 0.25s
          type: STATIC
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: grafana_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 3000
        - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
          name: victoriametrics_service
          connect_timeout: 0.25s
          type: STATIC
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: vm_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 8428
        - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
          name: logs_service
          connect_timeout: 0.25s
          type: STATIC
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: logs
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 8429
        - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
          name: web_service
          type: strict_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: service1
            endpoints:
            - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: httpbin.org
                      port_value: 80
        # BEGIN ANSIBLE MANAGED - VictoriaTraces OTel Cluster
        - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
          name: opentelemetry_collector
          connect_timeout: 5s
          type: STATIC
          lb_policy: ROUND_ROBIN
          http2_protocol_options: {}
          load_assignment:
            cluster_name: opentelemetry_collector
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: {{ victoriatraces_grpc_port }}
        # END ANSIBLE MANAGED - VictoriaTraces OTel Cluster
  notify: reload envoy

- name: Read current LDS content
  ansible.builtin.slurp:
    src: "{{ envoy_dynamic_config_dir }}/lds.yaml"
  register: lds_content

- name: Update LDS with tracing configuration
  ansible.builtin.copy:
    content: "{{ updated_lds }}"
    dest: "{{ envoy_dynamic_config_dir }}/lds.yaml"
    owner: envoy
    group: envoy
    mode: '0644'
  vars:
    updated_lds: |
      # filepath: {{ envoy_dynamic_config_dir }}/lds.yaml
      version_info: "2"
      resources:
        - "@type": type.googleapis.com/envoy.config.listener.v3.Listener
          name: listener_443
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 443
          listener_filters:
            - name: envoy.filters.listener.tls_inspector
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
          filter_chains:
            - filter_chain_match:
                server_names: ["www.microsoft.com", "*.microsoft.com"]
              filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: shadow_tls_passthrough
                    cluster: shadow_tls_client
        - "@type": type.googleapis.com/envoy.config.listener.v3.Listener
          name: listener_0
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 80
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    generate_request_id: true
                    tracing:
                      spawn_upstream_span: true
                    rds:
                      route_config_name: route_config_0
                      config_source:
                        path: {{ envoy_dynamic_config_dir }}/rds.yaml
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  notify: reload envoy

- name: Update Envoy bootstrap with tracing configuration
  ansible.builtin.copy:
    content: "{{ bootstrap_config }}"
    dest: "{{ envoy_config_dir }}/envoy.yaml"
    owner: root
    group: root
    mode: '0644'
  vars:
    bootstrap_config: |
      # filepath: {{ envoy_config_dir }}/envoy.yaml
      node:
        id: gtr-local
        cluster: gtr-cluster

      admin:
        access_log_path: /var/log/envoy/access.log
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 9901

      tracing:
        http:
          name: envoy.tracers.opentelemetry
          typed_config:
            "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
            grpc_service:
              envoy_grpc:
                cluster_name: opentelemetry_collector
            service_name: {{ envoy_service_name }}

      dynamic_resources:
        lds_config:
          path_config_source:
            path: {{ envoy_dynamic_config_dir }}/lds.yaml
        cds_config:
          path_config_source:
            path: {{ envoy_dynamic_config_dir }}/cds.yaml
  notify: restart envoy
