apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vmagent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Lynskylate/nas-deployment-public.git
    path: platform/resources/vmagent
    targetRevision: feat/observability-k8s-migration
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
