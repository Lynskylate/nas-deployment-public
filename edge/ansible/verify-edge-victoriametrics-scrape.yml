---
- name: Verify VictoriaMetrics scrape jobs for edge-proxy endpoints
  hosts: gtr_core
  become: true

  tasks:
    - name: Read VictoriaMetrics scrape config
      ansible.builtin.slurp:
        src: "{{ edge_vm_scrape_config_path }}"
      register: edge_vm_config_raw

    - name: Assert edge-proxy job names exist in scrape config
      ansible.builtin.assert:
        that:
          - item.job_name in (edge_vm_config_raw.content | b64decode)
        fail_msg: "Edge-proxy scrape job not found in config: {{ item.job_name }}"
      loop: "{{ edge_proxy_vm_scrape_jobs }}"

    - name: Verify targets endpoint contains edge-proxy jobs
      ansible.builtin.uri:
        url: "http://127.0.0.1:8428/api/v1/targets"
        return_content: true
      register: edge_vm_targets

    - name: Assert edge-proxy jobs are active in VictoriaMetrics
      ansible.builtin.assert:
        that:
          - item.job_name in edge_vm_targets.content
        fail_msg: "Edge-proxy scrape job missing from VictoriaMetrics targets: {{ item.job_name }}"
      loop: "{{ edge_proxy_vm_scrape_jobs }}"
