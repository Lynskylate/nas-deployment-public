[defaults]
inventory = inventory-edge.ini
roles_path = ./roles
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
timeout = 30
become_timeout = 60

[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
control_master = auto
control_persist = 600s
