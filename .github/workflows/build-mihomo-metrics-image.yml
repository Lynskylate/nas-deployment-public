name: Build mihomo-metrics image

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-mihomo-metrics-image.yml'
      - 'platform/images/mihomo-metrics/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: platform/images/mihomo-metrics
          push: true
          tags: ghcr.io/lynskylate/mihomo-metrics:alpine3.19
