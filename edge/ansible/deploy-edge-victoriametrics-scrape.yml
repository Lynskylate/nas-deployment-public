---
- name: Update VictoriaMetrics scrape jobs for edge-proxy endpoints
  hosts: gtr_core
  become: true

  roles:
    - role: edge-victoriametrics-scrape

  post_tasks:
    - name: Verify edge-proxy scrape targets appear in VictoriaMetrics
      ansible.builtin.uri:
        url: "http://127.0.0.1:8428/api/v1/targets"
        return_content: true
      register: edge_vm_targets

    - name: Assert all edge-proxy job names are present
      ansible.builtin.assert:
        that:
          - item.job_name in edge_vm_targets.content
        fail_msg: "Missing edge-proxy scrape job in VictoriaMetrics targets: {{ item.job_name }}"
      loop: "{{ edge_proxy_vm_scrape_jobs }}"
